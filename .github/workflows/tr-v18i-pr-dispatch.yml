name: Dispatch TR v18i build from PR

on:
  pull_request:
    branches: [tr-wine-compat-proton11-exact-wineserver-v18h]
    types: [opened, synchronize, reopened]

permissions:
  actions: write
  contents: write
  pull-requests: write
  issues: write

jobs:
  dispatch:
    if: github.event.pull_request.head.ref == 'tr-wine-compat-proton11-runtime-closure-v18i'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: tr-wine-compat-proton11-runtime-closure-v18i
          fetch-depth: 0

      - name: Correct built winex11 module path once
        run: |
          set -euo pipefail
          git pull --ff-only origin tr-wine-compat-proton11-runtime-closure-v18i
          TARGET=.github/workflows/tr-winlator-v18i-runtime-closure.yml
          BEFORE=$(grep -F -c "x86_64-unix/winex11.drv.so" "$TARGET" || true)
          AFTER=$(grep -F -c "x86_64-unix/winex11.so" "$TARGET" || true)
          if [ "$BEFORE" -eq 1 ]; then
            sed -i 's#x86_64-unix/winex11\.drv\.so#x86_64-unix/winex11.so#' "$TARGET"
            grep -F "x86_64-unix/winex11.so" "$TARGET"
            git diff --check
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add "$TARGET"
            git commit -m "Fix v18i winex11 validation path"
            git push origin HEAD:tr-wine-compat-proton11-runtime-closure-v18i
          elif [ "$AFTER" -ne 1 ]; then
            echo "Unexpected winex11 validation path state: old=$BEFORE new=$AFTER" >&2
            exit 1
          fi

      - name: Dispatch v18i build
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'tr-winlator-v18i-runtime-closure.yml',
              ref: context.payload.pull_request.head.ref,
            });

      - name: Record dispatched run on PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          sleep 30
          RUNS=$(gh api \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/tr-winlator-v18i-runtime-closure.yml/runs?branch=tr-wine-compat-proton11-runtime-closure-v18i&per_page=5" \
            --jq '[.workflow_runs[] | {id,run_number,event,status,conclusion,head_sha,created_at,updated_at,html_url}]')
          BODY=$(printf 'v18i dispatched workflow status\n\n```json\n%s\n```\n' "$RUNS")
          gh api "repos/${GITHUB_REPOSITORY}/issues/${{ github.event.pull_request.number }}/comments" -f body="$BODY"
