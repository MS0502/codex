name: TR Wine 10.10 compatibility build

on:
  push:
    branches:
      - tr-wine-compat-patch
    paths:
      - 'tr_wine_compat/**'
      - '.github/workflows/tr-wine-compat-build.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'tr_wine_compat/**'
      - '.github/workflows/tr-wine-compat-build.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential gcc-multilib g++-multilib libc6-dev:i386 \
            flex bison mingw-w64 pkg-config python3 git ca-certificates

      - name: Fetch Wine 10.10 and apply patch
        run: |
          git clone --depth 1 --branch wine-10.10 https://github.com/wine-mirror/wine.git wine-src
          python3 "$GITHUB_WORKSPACE/tr_wine_compat/apply_wine_10_10_patch.py" "$GITHUB_WORKSPACE/wine-src"
          git -C wine-src diff --check
          git -C wine-src diff -- include/winnt.h dlls/ntdll/unix/security.c dlls/wow64/security.c

      - name: Configure 64-bit Wine
        run: |
          mkdir build64
          cd build64
          ../wine-src/configure \
            --enable-win64 \
            --prefix=/opt/wine-trcompat \
            --without-alsa --without-capi --without-coreaudio --without-cups \
            --without-dbus --without-fontconfig --without-freetype --without-gettext \
            --without-gettextpo --without-gphoto --without-gssapi --without-inotify \
            --without-krb5 --without-ldap --without-netapi --without-openal \
            --without-opencl --without-opengl --without-oss --without-pcap \
            --without-pcsclite --without-pulse --without-sane --without-sdl \
            --without-udev --without-unwind --without-usb --without-v4l2 \
            --without-vulkan --without-wayland --without-x --without-xattr

      - name: Build patched Wine components
        shell: bash
        run: |
          set -o pipefail
          make -C build64 -j2 \
            dlls/ntdll/ntdll.so \
            dlls/ntdll/x86_64-windows/ntdll.dll \
            dlls/wow64/x86_64-windows/wow64.dll 2>&1 | tee build.log

      - name: Collect patched components
        run: |
          mkdir -p out/lib/wine/x86_64-unix out/lib/wine/x86_64-windows
          cp -v build64/dlls/ntdll/ntdll.so out/lib/wine/x86_64-unix/ntdll.so
          cp -v build64/dlls/ntdll/x86_64-windows/ntdll.dll out/lib/wine/x86_64-windows/ntdll.dll
          cp -v build64/dlls/wow64/x86_64-windows/wow64.dll out/lib/wine/x86_64-windows/wow64.dll
          cp tr_wine_compat/wine-10.10-token-private-namespace.patch out/
          find out -type f -print0 | sort -z | xargs -0 sha256sum | tee out/SHA256SUMS.txt

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TR_WINE_10_10_BUILD_LOG
          path: build.log
          if-no-files-found: warn
          retention-days: 30

      - name: Upload patched components
        uses: actions/upload-artifact@v4
        with:
          name: TR_WINE_10_10_TOKEN_NAMESPACE_COMPONENTS
          path: out/**
          if-no-files-found: error
          retention-days: 30
