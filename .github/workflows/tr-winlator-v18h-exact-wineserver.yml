name: TR Winlator v18h exact Proton 11 wineserver APK

on:
  push:
    branches: [tr-wine-compat-proton11-exact-wineserver-v18h]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: tr-winlator-v18h-exact-wineserver-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-package:
    runs-on: ubuntu-24.04
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4

      - name: Free source-build disk
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /opt/ghc || true
          docker system prune -af || true
          df -h

      - name: Install build tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git git-lfs ca-certificates curl jq zstd xz-utils file binutils ccache \
            python3 unzip coreutils
          docker version

      - name: Restore Proton ccache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: proton11-wine-source-v18h-${{ runner.os }}-${{ runner.arch }}
          restore-keys: |
            proton11-wine-source-v18f-${{ runner.os }}-${{ runner.arch }}
            proton11-wine-source-v18e-${{ runner.os }}-${{ runner.arch }}
            proton11-wine-source-

      - name: Fetch pinned official Proton 11 source
        run: |
          set -euo pipefail
          git init proton-src
          git -C proton-src remote add origin https://github.com/ValveSoftware/Proton.git
          git -C proton-src fetch --depth 1 origin d2bedfad453584d05308f5e3e1f9657e3f0f71d3
          git -C proton-src checkout --detach FETCH_HEAD
          git -C proton-src submodule update --init --recursive --depth 1
          test "$(git -C proton-src rev-parse HEAD)" = \
            d2bedfad453584d05308f5e3e1f9657e3f0f71d3
          test "$(git -C proton-src/wine rev-parse HEAD)" = \
            81d78e4f3ea8ce868d775021fdc9f90122dc1a6b
          git -C proton-src rev-parse HEAD | tee proton-source-head.txt
          git -C proton-src submodule status --recursive | tee proton-submodules.txt
          test -f proton-src/configure.sh
          test -d proton-src/wine

      - name: Patch both Wine server-path implementations exactly
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          root = Path('proton-src/wine')
          request = root / 'server/request.c'
          client = root / 'dlls/ntdll/unix/server.c'

          request_text = request.read_text(encoding='utf-8')
          client_text = client.read_text(encoding='utf-8')

          request_old = "\n".join([
              "#ifdef __ANDROID__  /* there's no /tmp dir on Android */",
              "    if (asprintf( &base_dir, \"%s/.wineserver\", config_dir ) == -1)",
              "        fatal_error( \"out of memory\\n\" );",
              "#else",
              "    if (asprintf( &base_dir, \"/tmp/.wine-%u\", getuid() ) == -1)",
              "        fatal_error( \"out of memory\\n\" );",
              "#endif",
          ])
          request_new = "\n".join([
              "/* Winlator glibc build runs inside the Android app sandbox. */",
              "    if (asprintf( &base_dir, \"%s/.wineserver\", config_dir ) == -1)",
              "        fatal_error( \"out of memory\\n\" );",
          ])

          client_old = "\n".join([
              "#ifdef __ANDROID__  /* there's no /tmp dir on Android */",
              "    asprintf( &dir, \"%s/.wineserver/server-%llx-%llx\", config_dir, (unsigned long long)dev, (unsigned long long)ino );",
              "#else",
              "    asprintf( &dir, \"/tmp/.wine-%u/server-%llx-%llx\", getuid(), (unsigned long long)dev, (unsigned long long)ino );",
              "#endif",
          ])
          client_new = "\n".join([
              "/* Match the Android-safe wineserver location under WINEPREFIX. */",
              "    asprintf( &dir, \"%s/.wineserver/server-%llx-%llx\", config_dir, (unsigned long long)dev, (unsigned long long)ino );",
          ])

          gates = [
              ('server/request.c', request_text.count(request_old)),
              ('dlls/ntdll/unix/server.c', client_text.count(client_old)),
          ]
          bad = [(name, count) for name, count in gates if count != 1]
          if bad:
              raise SystemExit(f'exact source-anchor failure: {bad}')

          request_text = request_text.replace(request_old, request_new, 1)
          client_text = client_text.replace(client_old, client_new, 1)
          request.write_text(request_text, encoding='utf-8')
          client.write_text(client_text, encoding='utf-8')

          leftovers = []
          for path in root.rglob('*'):
              if not path.is_file():
                  continue
              try:
                  text = path.read_text(encoding='utf-8')
              except (UnicodeDecodeError, OSError):
                  continue
              if '/tmp/.wine-%u' in text:
                  leftovers.append(str(path))
          if leftovers:
              raise SystemExit(f'legacy server path remains: {leftovers}')

          report = "\n".join([
              'proton=d2bedfad453584d05308f5e3e1f9657e3f0f71d3',
              'wine=81d78e4f3ea8ce868d775021fdc9f90122dc1a6b',
              'patched=server/request.c',
              'patched=dlls/ntdll/unix/server.c',
              'server_base=WINEPREFIX/.wineserver',
              'legacy_tmp_occurrences_after=0',
              '',
          ])
          Path('proton-wineserver-path-patch.txt').write_text(report, encoding='utf-8')
          print(report)
          PY

          git -C proton-src/wine diff --check
          git -C proton-src/wine diff -- server/request.c dlls/ntdll/unix/server.c \
            | tee proton-wineserver-path.patch
          test "$(grep -R -F '/tmp/.wine-%u' proton-src/wine \
            --include='*.c' --include='*.h' | wc -l)" -eq 0
          test "$(grep -R -F '.wineserver' proton-src/wine/server/request.c \
            proton-src/wine/dlls/ntdll/unix/server.c | wc -l)" -eq 2

      - name: Configure official Proton SDK
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: |
          set -euo pipefail
          mkdir -p proton-build "$CCACHE_DIR"
          cd proton-build
          ../proton-src/configure.sh \
            --container-engine=docker \
            --enable-ccache \
            --build-name=tr_v18h_proton11_exact_wineserver 2>&1 \
            | tee ../proton-configure.log
          make help | tee ../proton-make-help.txt

      - name: Build Proton 11 Wine
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: |
          set -euo pipefail
          cd proton-build
          make -j"$(nproc)" wine 2>&1 | tee ../proton-wine-build.log
          cd ..
          test -e proton-build/dist/files/bin/wine
          test -f proton-build/dist/files/bin/wineserver
          df -h

      - name: Verify ABI and matching compiled server paths
        run: |
          set -euo pipefail
          SOURCE="proton-build/dist/files"
          test -f "$SOURCE/lib/wine/x86_64-unix/ntdll.so"
          test -f "$SOURCE/lib/wine/x86_64-windows/wow64.dll"
          test -f "$SOURCE/lib/wine/x86_64-unix/nsiproxy.so"
          test -f "$SOURCE/lib/wine/x86_64-windows/ntoskrnl.exe"

          WINE_REAL="$(readlink -f "$SOURCE/bin/wine")"
          file "$WINE_REAL" | tee proton-source-wine-file.txt
          readelf -d "$WINE_REAL" | tee proton-source-wine-dynamic.txt
          readelf -Ws "$WINE_REAL" | tee proton-source-wine-symbols.txt
          ! grep -w '__libc_init' proton-source-wine-symbols.txt
          grep -F 'Shared library: [libc.so.6]' proton-source-wine-dynamic.txt

          strings "$SOURCE/bin/wineserver" > proton-wineserver-strings.txt
          strings "$SOURCE/lib/wine/x86_64-unix/ntdll.so" > proton-ntdll-unix-strings.txt
          grep -F '.wineserver' proton-wineserver-strings.txt \
            | tee proton-wineserver-string-check.txt
          grep -F '.wineserver' proton-ntdll-unix-strings.txt \
            | tee proton-ntdll-string-check.txt
          if grep -F '/tmp/.wine-%u' proton-wineserver-strings.txt \
            proton-ntdll-unix-strings.txt; then
            echo 'compiled server/client still contain legacy /tmp format' >&2
            exit 1
          fi

          SMOKE="$PWD/wineserver-smoke-prefix"
          mkdir -p "$SMOKE"
          set +e
          WINEPREFIX="$SMOKE" timeout 5 "$SOURCE/bin/wineserver" -f -p0 \
            > wineserver-smoke.log 2>&1
          STATUS=$?
          set -e
          case "$STATUS" in
            0|124) ;;
            *) cat wineserver-smoke.log; exit "$STATUS" ;;
          esac
          test -d "$SMOKE/.wineserver"
          find "$SMOKE/.wineserver" -maxdepth 2 -printf '%M %u:%g %p\n' \
            | tee wineserver-smoke-tree.txt
          if grep -F '/tmp/.wine-' wineserver-smoke.log; then
            cat wineserver-smoke.log
            exit 1
          fi

          mv "$SOURCE" proton-wine-tree
          rm -rf proton-build proton-src "$SMOKE"
          df -h

      - name: Extract required runtime components
        run: |
          set -euo pipefail
          mkdir -p proton-components
          cp -L proton-wine-tree/lib/wine/x86_64-unix/ntdll.so proton-components/ntdll.so
          cp -L proton-wine-tree/lib/wine/x86_64-windows/wow64.dll proton-components/wow64.dll
          cp -L proton-wine-tree/bin/wineserver proton-components/wineserver
          cp -L proton-wine-tree/lib/wine/x86_64-unix/nsiproxy.so proton-components/nsiproxy.so
          sha256sum proton-components/* | tee proton-components-sha256.txt

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK components
        run: |
          set -euo pipefail
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(find "$ANDROID_HOME/cmdline-tools" -type f -name sdkmanager -print -quit)"
          fi
          test -x "$SDKMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" 'platforms;android-34' 'build-tools;34.0.0' \
            'cmake;3.22.1' 'ndk;24.0.8215888'

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Fetch exact Winlator 11.1 source
        run: |
          set -euo pipefail
          git init winlator-app
          git -C winlator-app remote add origin https://github.com/brunodev85/winlator-app.git
          git -C winlator-app fetch --depth 1 origin c2f4ad4534f4637b543a9a3b085e28f50cf6d01c
          git -C winlator-app checkout --detach FETCH_HEAD
          git -C winlator-app lfs pull
          test -s winlator-app/app/src/main/assets/rootfs.tzst

      - name: Apply v18h source-built runtime
        run: |
          set -euo pipefail
          python3 tr_winlator_apk/apply_v18b_patch.py \
            winlator-app proton-wine-tree proton-components 2>&1 | tee v18h-apply.log

          python3 - <<'PY'
          from pathlib import Path

          replacements = {
              Path('winlator-app/app/build.gradle'): {
                  '11.1-trcompat18b-proton11-valve-glibc':
                      '11.1-trcompat18h-proton11-exact-wineserver',
              },
              Path('winlator-app/app/src/main/java/com/winlator/core/TrCompatDiagnostics.java'): {
                  'TR_DIAG_v18B_PROTON11_GLIBC.zip':
                      'TR_DIAG_v18H_PROTON11_EXACT_WINESERVER.zip',
                  'version=18b-proton11-valve-glibc':
                      'version=18h-proton11-exact-wineserver',
                  'v18b Valve Proton 11 glibc':
                      'v18h Proton 11 exact wineserver',
              },
              Path('winlator-app/app/src/main/java/com/winlator/core/TrCompatWinePatcher.java'): {
                  'v18b-proton11-valve-glibc-1':
                      'v18h-proton11-exact-wineserver-1',
                  '.trcompat-v18b.tmp': '.trcompat-v18h.tmp',
              },
              Path('winlator-app/app/src/main/java/com/winlator/core/TrCompatRootfsPatcher.java'): {
                  'v18b-proton11-valve-glibc-1':
                      'v18h-proton11-exact-wineserver-1',
                  '.trcompat-v18b.tmp': '.trcompat-v18h.tmp',
              },
          }
          for path, mapping in replacements.items():
              text = path.read_text(encoding='utf-8')
              for old, new in mapping.items():
                  if text.count(old) < 1:
                      raise SystemExit(f'{path}: missing replacement anchor: {old}')
                  text = text.replace(old, new)
              path.write_text(text, encoding='utf-8')
          PY

          grep -F '11.1-trcompat18h-proton11-exact-wineserver' \
            winlator-app/app/build.gradle
          grep -R -F 'v18h-proton11-exact-wineserver-1' \
            winlator-app/app/src/main/java/com/winlator/core/TrCompatWinePatcher.java \
            winlator-app/app/src/main/java/com/winlator/core/TrCompatRootfsPatcher.java
          rm -rf proton-wine-tree proton-components
          df -h

      - name: Restore signing key
        id: debug-key-cache
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: trcompat-debug-keystore-v1

      - name: Create signing key
        if: steps.debug-key-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.android"
          keytool -genkeypair -keystore "$HOME/.android/debug.keystore" \
            -storepass android -alias androiddebugkey -keypass android \
            -dname 'CN=Android Debug,O=Android,C=US' -keyalg RSA -keysize 2048 \
            -validity 10000 -noprompt

      - name: Build APK
        working-directory: winlator-app
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew --no-daemon --stacktrace assembleDebug 2>&1 \
            | tee ../apk-build-v18h.log

      - name: Collect APK
        run: |
          set -euo pipefail
          mkdir -p out-v18h
          cp winlator-app/app/build/outputs/apk/debug/app-debug.apk \
            out-v18h/Winlator_11.1_TR_Compat_v18H_PROTON11_EXACT_WINESERVER.apk
          sha256sum out-v18h/*.apk | tee out-v18h/SHA256SUMS.txt
          ls -lh out-v18h/*

      - name: Upload v18h APK
        uses: actions/upload-artifact@v4
        with:
          name: WINLATOR_11_1_TR_COMPAT_APK_V18H_PROTON11_EXACT_WINESERVER
          path: out-v18h/*
          if-no-files-found: error
          retention-days: 30

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: WINLATOR_11_1_TR_COMPAT_V18H_BUILD_LOG
          path: |
            proton-configure.log
            proton-make-help.txt
            proton-wine-build.log
            proton-source-head.txt
            proton-submodules.txt
            proton-wineserver-path-patch.txt
            proton-wineserver-path.patch
            proton-source-wine-file.txt
            proton-source-wine-dynamic.txt
            proton-source-wine-symbols.txt
            proton-wineserver-strings.txt
            proton-ntdll-unix-strings.txt
            proton-wineserver-string-check.txt
            proton-ntdll-string-check.txt
            wineserver-smoke.log
            wineserver-smoke-tree.txt
            proton-components-sha256.txt
            v18h-apply.log
            apk-build-v18h.log
          if-no-files-found: warn
          retention-days: 30
