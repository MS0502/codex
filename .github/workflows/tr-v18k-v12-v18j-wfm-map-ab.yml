name: TR v18K v12-v18J WFM map A-B

on:
  push:
    branches: [tr-wine-compat-proton11-xshape-restore-v18k]
    paths: [.github/workflows/tr-v18k-v12-v18j-wfm-map-ab.yml]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  shell-map-ab:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: v12-wine1010
            startup: wfm
            artifact_id: '8373865077'
            apk_sha256: a9a9c7948d8c4aecd1d8d4ac607e5533a6753a4160e8b8570469c01b53b1d7a8
          - runtime: v12-wine1010
            startup: cmd
            artifact_id: '8373865077'
            apk_sha256: a9a9c7948d8c4aecd1d8d4ac607e5533a6753a4160e8b8570469c01b53b1d7a8
          - runtime: v18j-proton11
            startup: wfm
            artifact_id: '8442434345'
            apk_sha256: 4003bcb0c863519720116d93540e161d640800692c0e002f7e8ac42434e5a215
          - runtime: v18j-proton11
            startup: cmd
            artifact_id: '8442434345'
            apk_sha256: 4003bcb0c863519720116d93540e161d640800692c0e002f7e8ac42434e5a215

    steps:
      - uses: actions/checkout@v4

      - name: Install ARM64 diagnostic tools
        run: |
          set -euo pipefail
          test "$(dpkg --print-architecture)" = arm64
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            curl unzip zstd file binutils xvfb x11-utils imagemagick procps \
            gcc libx11-dev python3

      - name: Run pinned shell mapping case
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_ID: ${{ matrix.artifact_id }}
          EXPECTED_APK_SHA256: ${{ matrix.apk_sha256 }}
          RUNTIME_NAME: ${{ matrix.runtime }}
          STARTUP: ${{ matrix.startup }}
        run: bash tr_winlator_apk/run_v12_v18j_wfm_map_ab.sh

      - name: Upload shell mapping evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: WFM_MAP_AB_${{ matrix.runtime }}_${{ matrix.startup }}
          path: evidence/
          if-no-files-found: warn
