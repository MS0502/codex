name: Publish TR v18K XShape hotpatch

on:
  push:
    branches: [tr-wine-compat-proton11-native-wrapper-closure-v18j]
    paths:
      - .github/workflows/tr-v18k-xshape-hotpatch-publish.yml
      - tr_winlator_apk/hotpatch/xshape_hotpatch.sh

permissions:
  actions: read
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      V18H_ARTIFACT_ID: '8436186617'
      V18H_APK_SHA256: d540254e93452b099621b9deee8de94405f27612b232abb5366dc7a3ff56a9d9
      WINEX11_64_SHA256: 15d0fccef857a9a6fb96879fe5e6dd5e742473b27adf2a7188c0b06ec14b1b28
      WINEX11_32_SHA256: 541d6113b94e77f24a6d3ae0bb48774e24e420737371ed57c2c9b1c0f3ec0174
    steps:
      - uses: actions/checkout@v4
        with:
          ref: tr-wine-compat-proton11-native-wrapper-closure-v18j

      - name: Build verified 1 MB hotpatch package
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y unzip zstd binutils
          curl --fail --location --retry 3 \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${V18H_ARTIFACT_ID}/zip" \
            -o /tmp/v18h-artifact.zip
          mkdir -p /tmp/v18h-artifact /tmp/apk /tmp/rootfs /tmp/hotpatch/payload/x86_64-unix /tmp/hotpatch/payload/i386-unix
          unzip -q /tmp/v18h-artifact.zip -d /tmp/v18h-artifact
          APK="$(find /tmp/v18h-artifact -maxdepth 1 -type f -name '*.apk' -print -quit)"
          test -n "$APK"
          printf '%s  %s\n' "$V18H_APK_SHA256" "$APK" | sha256sum -c -
          unzip -q "$APK" assets/rootfs.tzst -d /tmp/apk
          tar --use-compress-program=unzstd -xf /tmp/apk/assets/rootfs.tzst -C /tmp/rootfs
          cp /tmp/rootfs/opt/wine/lib/wine/x86_64-unix/winex11.so /tmp/hotpatch/payload/x86_64-unix/
          cp /tmp/rootfs/opt/wine/lib/wine/i386-unix/winex11.so /tmp/hotpatch/payload/i386-unix/
          cp tr_winlator_apk/hotpatch/xshape_hotpatch.sh /tmp/hotpatch/
          chmod 0755 /tmp/hotpatch/xshape_hotpatch.sh
          printf '%s  %s\n' "$WINEX11_64_SHA256" /tmp/hotpatch/payload/x86_64-unix/winex11.so | sha256sum -c -
          printf '%s  %s\n' "$WINEX11_32_SHA256" /tmp/hotpatch/payload/i386-unix/winex11.so | sha256sum -c -
          nm -D /tmp/hotpatch/payload/x86_64-unix/winex11.so | grep -F XShapeCombineRectangles
          bash -n /tmp/hotpatch/xshape_hotpatch.sh
          (
            cd /tmp/hotpatch
            sha256sum xshape_hotpatch.sh payload/x86_64-unix/winex11.so payload/i386-unix/winex11.so > SHA256SUMS.txt
            tar -czf /tmp/TR_V18K_XSHAPE_TERMUX_HOTPATCH.tar.gz .
          )
          sha256sum /tmp/TR_V18K_XSHAPE_TERMUX_HOTPATCH.tar.gz > /tmp/TR_V18K_XSHAPE_TERMUX_HOTPATCH.tar.gz.sha256
          test "$(stat -c %s /tmp/TR_V18K_XSHAPE_TERMUX_HOTPATCH.tar.gz)" -lt 3000000

      - name: Commit package to branch for direct Termux download
        run: |
          set -euo pipefail
          mkdir -p tr_winlator_apk/hotpatch_release
          cp /tmp/TR_V18K_XSHAPE_TERMUX_HOTPATCH.tar.gz tr_winlator_apk/hotpatch_release/
          cp /tmp/TR_V18K_XSHAPE_TERMUX_HOTPATCH.tar.gz.sha256 tr_winlator_apk/hotpatch_release/
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add tr_winlator_apk/hotpatch_release/
          git commit -m 'Publish verified v18K XShape Termux hotpatch' || exit 0
          git push origin HEAD:tr-wine-compat-proton11-native-wrapper-closure-v18j
