name: TR v18K ARM64 Wine smoke v2

on:
  push:
    branches: [tr-wine-compat-proton11-xshape-restore-v18k]
    paths: [.github/workflows/tr-v18k-arm64-runtime-smoke-v2.yml]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  arm64-runtime-smoke:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    env:
      V18J_ARTIFACT_ID: '8442434345'
    steps:
      - uses: actions/checkout@v4

      - name: Install verified ARM64 test environment
        run: |
          set -euo pipefail
          uname -a | tee runner-uname.txt
          dpkg --print-architecture | tee runner-architecture.txt
          test "$(dpkg --print-architecture)" = arm64
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            curl unzip zstd file binutils xvfb x11-utils imagemagick procps \
            xserver-xorg-core xserver-xorg-video-dummy
          Xvfb -help > xvfb-help.txt 2>&1 || true
          grep -F -- '-extension name' xvfb-help.txt

      - name: Download exact v18J APK inside Actions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl --fail --location --retry 3 \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${V18J_ARTIFACT_ID}/zip" \
            -o v18j-artifact.zip
          unzip -q v18j-artifact.zip -d v18j-artifact
          APK="$(find v18j-artifact -maxdepth 1 -type f -name '*.apk' -print -quit)"
          test -n "$APK"
          sha256sum "$APK" | tee v18j-apk-sha256.txt
          grep -F '4003bcb0c863519720116d93540e161d640800692c0e002f7e8ac42434e5a215' \
            v18j-apk-sha256.txt
          cp "$APK" v18j.apk

      - name: Prepare exact Box64 Wine rootfs
        run: |
          set -euo pipefail
          mkdir -p apk rootfs box64 prefix evidence
          unzip -q v18j.apk assets/rootfs.tzst assets/container_pattern.tzst \
            assets/box64/box64-0.4.0.tzst -d apk
          tar --use-compress-program=unzstd -xf apk/assets/rootfs.tzst -C rootfs
          tar --use-compress-program=unzstd -xf apk/assets/box64/box64-0.4.0.tzst -C box64
          tar --use-compress-program=unzstd -xf apk/assets/container_pattern.tzst -C prefix

          file box64/usr/local/bin/box64 rootfs/opt/wine/bin/wine \
            rootfs/opt/wine/bin/wineserver | tee runtime-file-types.txt
          grep -F 'ARM aarch64' runtime-file-types.txt
          test "$(grep -c 'x86-64' runtime-file-types.txt)" -ge 2

          sudo install -D -m 0755 box64/usr/local/bin/box64 rootfs/usr/local/bin/box64
          sudo mkdir -p rootfs/home/winlator rootfs/data/data/com.winlator.trcompat/files
          sudo cp -a prefix/.wine rootfs/home/winlator/.wine
          sudo ln -sfn / rootfs/data/data/com.winlator.trcompat/files/rootfs
          sudo mkdir -p rootfs/etc rootfs/var/lib/dbus rootfs/tmp rootfs/dev rootfs/proc rootfs/sys
          printf '%s\n' 0123456789abcdef0123456789abcdef | sudo tee rootfs/etc/machine-id >/dev/null
          sudo ln -sfn /etc/machine-id rootfs/var/lib/dbus/machine-id

          test -x rootfs/usr/local/bin/box64
          test -x rootfs/opt/wine/bin/wine
          test -x rootfs/opt/wine/bin/wineserver
          test -f rootfs/opt/wine/lib/wine/x86_64-windows/explorer.exe

      - name: Configure SHAPE and no-SHAPE X servers
        run: |
          set -euo pipefail
          cat > xorg-noshape.conf <<'EOF'
          Section "ServerFlags"
              Option "AutoAddDevices" "false"
              Option "DontVTSwitch" "true"
              Option "AllowMouseOpenFail" "true"
          EndSection
          Section "Extensions"
              Option "SHAPE" "Disable"
          EndSection
          Section "Device"
              Identifier "DummyDevice"
              Driver "dummy"
              VideoRam 256000
          EndSection
          Section "Monitor"
              Identifier "DummyMonitor"
              HorizSync 5.0-1000.0
              VertRefresh 5.0-200.0
              Modeline "1280x720" 74.50 1280 1344 1472 1664 720 723 728 748
          EndSection
          Section "Screen"
              Identifier "DummyScreen"
              Device "DummyDevice"
              Monitor "DummyMonitor"
              DefaultDepth 24
              SubSection "Display"
                  Depth 24
                  Modes "1280x720"
              EndSubSection
          EndSection
          Section "ServerLayout"
              Identifier "DummyLayout"
              Screen "DummyScreen"
          EndSection
          EOF

      - name: Mount isolated runtime namespace
        run: |
          set -euo pipefail
          sudo mount --rbind /dev rootfs/dev
          sudo mount --make-rslave rootfs/dev
          sudo mount -t proc proc rootfs/proc
          sudo mount --rbind /sys rootfs/sys
          sudo mount --make-rslave rootfs/sys
          sudo mount --bind /tmp rootfs/tmp

      - name: Execute Explorer on both X server capabilities
        run: |
          set -euo pipefail

          stop_runtime() {
            sudo pkill -TERM box64 2>/dev/null || true
            sleep 2
            sudo pkill -KILL box64 2>/dev/null || true
          }

          run_case() {
            local name="$1" display="$2" mode="$3"
            local out="evidence/${name}"
            mkdir -p "$out"
            stop_runtime

            if [ "$mode" = shape ]; then
              Xvfb "$display" -screen 0 1280x720x24 -nolisten tcp \
                >"$out/xserver.log" 2>&1 &
            else
              sudo Xorg "$display" -noreset -nolisten tcp -config "$PWD/xorg-noshape.conf" \
                -logfile "$PWD/$out/Xorg.log" >"$out/xserver.log" 2>&1 &
            fi
            local xpid=$!
            for _ in $(seq 1 30); do
              xdpyinfo -display "$display" >/dev/null 2>&1 && break
              sleep 1
            done
            xdpyinfo -display "$display" >"$out/xdpyinfo.txt"
            xdpyinfo -display "$display" | sed -n '/number of extensions:/,/default screen number:/p' \
              >"$out/extensions.txt"
            if [ "$mode" = shape ]; then
              grep -qx '[[:space:]]*SHAPE' "$out/extensions.txt"
            else
              test "$(grep -c 'SHAPE' "$out/extensions.txt" || true)" -eq 0
            fi

            sudo env HOME=/home/winlator USER=winlator DISPLAY="$display" \
              WINEPREFIX=/home/winlator/.wine WINEDEBUG=warn+all,err+all \
              PATH=/opt/wine/bin:/usr/local/bin:/usr/bin:/bin \
              BOX64_NOBANNER=0 BOX64_LOG=1 BOX64_DYNAREC=1 \
              BOX64_PATH=/opt/wine/bin:/usr/bin:/bin \
              BOX64_LD_LIBRARY_PATH=/opt/wine/lib:/usr/lib:/lib \
              timeout --signal=TERM 90s chroot rootfs \
              /usr/local/bin/box64 /opt/wine/bin/wine \
              explorer.exe /desktop=TRSmoke,1280x720 \
              >"$out/wine.log" 2>&1 &
            local runtime_pid=$!

            local alive=0 windows=0
            for second in 10 20 30 40 50 60; do
              sleep 10
              if kill -0 "$runtime_pid" 2>/dev/null; then alive=$((alive + 1)); fi
              ps -eo pid,ppid,stat,etime,comm,args \
                | grep -E 'box64|wine|wineserver|explorer' | grep -v grep \
                >>"$out/processes.txt" || true
              xwininfo -display "$display" -root -tree >"$out/xwininfo-${second}.txt" 2>&1 || true
              if grep -Eqi 'TRSmoke|Wine desktop|explorer' "$out/xwininfo-${second}.txt"; then
                windows=$((windows + 1))
              fi
              import -display "$display" -window root "$out/screen-${second}.png" || true
            done

            printf 'alive_checks=%s\nwindow_checks=%s\n' "$alive" "$windows" | tee "$out/result.txt"
            grep -Ei 'c0000135|service[^\n]*126|RpcSs[^\n]*fail|segmentation fault|SIGSEGV' \
              "$out/wine.log" >"$out/fatal-markers.txt" || true

            kill "$runtime_pid" 2>/dev/null || true
            wait "$runtime_pid" || true
            stop_runtime
            sudo kill "$xpid" 2>/dev/null || true
            wait "$xpid" || true

            test "$alive" -ge 5
            test "$windows" -ge 5
            test ! -s "$out/fatal-markers.txt"
          }

          run_case shape-advertised :99 shape
          run_case shape-disabled :100 noshape

      - name: Unmount isolated runtime namespace
        if: always()
        run: |
          sudo pkill -KILL box64 2>/dev/null || true
          sudo pkill -KILL Xvfb 2>/dev/null || true
          sudo pkill -KILL Xorg 2>/dev/null || true
          sudo umount -l rootfs/tmp 2>/dev/null || true
          sudo umount -l rootfs/proc 2>/dev/null || true
          sudo umount -R -l rootfs/sys 2>/dev/null || true
          sudo umount -R -l rootfs/dev 2>/dev/null || true

      - name: Upload runtime evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: V18J_ARM64_WINE_SMOKE_V2_EVIDENCE
          path: |
            evidence/
            runner-uname.txt
            runner-architecture.txt
            xvfb-help.txt
            v18j-apk-sha256.txt
            runtime-file-types.txt
            xorg-noshape.conf
          if-no-files-found: warn
