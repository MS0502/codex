name: TR v18K compiled no-SHAPE Xvfb matrix

on:
  pull_request:
    branches: [tr-wine-compat-proton11-native-wrapper-closure-v18j]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  actions: read

jobs:
  build-noshape-xvfb:
    if: github.event.pull_request.head.ref == 'tr-wine-compat-proton11-xshape-restore-v18k'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Enable Ubuntu source repositories
        run: |
          set -euo pipefail
          test "$(dpkg --print-architecture)" = arm64
          SOURCES=/etc/apt/sources.list.d/ubuntu.sources
          test -f "$SOURCES"
          sudo sed -i 's/^Types: deb$/Types: deb deb-src/' "$SOURCES"
          grep -F 'Types: deb deb-src' "$SOURCES"
          sudo apt-get update

      - name: Install exact Xserver build dependencies
        run: |
          set -euo pipefail
          sudo DEBIAN_FRONTEND=noninteractive apt-get build-dep -y xorg-server
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            devscripts dpkg-dev meson ninja-build xz-utils file binutils \
            x11-utils curl unzip zstd imagemagick procps gcc libx11-dev

      - name: Fetch and patch Ubuntu Xserver source
        run: |
          set -euo pipefail
          mkdir -p xserver-source evidence-build
          cd xserver-source
          apt-get source xorg-server 2>&1 | tee ../evidence-build/apt-source.log
          SOURCE="$(find . -mindepth 1 -maxdepth 1 -type d -name 'xorg-server-*' -print -quit)"
          test -n "$SOURCE"
          echo "$SOURCE" | tee ../evidence-build/source-directory.txt
          dpkg-parsechangelog -l"$SOURCE/debian/changelog" -S Version \
            | tee ../evidence-build/source-version.txt

          python3 - "$SOURCE" <<'PY'
          from pathlib import Path
          import re
          import sys

          root = Path(sys.argv[1])

          # Keep shape.c in the build because other Xserver objects may depend on
          # its internal symbols. Remove only the extension registration so the
          # server does not advertise or initialize the SHAPE protocol extension.
          meson = root / "Xext/meson.build"
          meson_text = meson.read_text(encoding="utf-8")
          shape_anchor = "    'shape.c',\n"
          if meson_text.count(shape_anchor) != 1:
              raise SystemExit(
                  f"shape.c Meson anchor count={meson_text.count(shape_anchor)}"
              )

          init = root / "mi/miinitext.c"
          init_text = init.read_text(encoding="utf-8")
          pattern = re.compile(
              r'^\s*\{ShapeExtensionInit,\s*"SHAPE",\s*[^}]+\},\s*\n',
              re.MULTILINE,
          )
          patched, count = pattern.subn("", init_text, count=1)
          if count != 1:
              raise SystemExit(f"SHAPE extension registration count={count}")
          init.write_text(patched, encoding="utf-8")
          PY

          test "$(grep -c -F "'shape.c'" "$SOURCE/Xext/meson.build")" -eq 1
          ! grep -F '{ShapeExtensionInit, "SHAPE"' "$SOURCE/mi/miinitext.c"
          grep -n -C 4 'Generic Event Extension' "$SOURCE/mi/miinitext.c" \
            | tee ../evidence-build/miinitext-after.txt
          sed -n '1,24p' "$SOURCE/Xext/meson.build" \
            | tee ../evidence-build/xext-meson-after.txt

      - name: Build minimal ARM64 Xvfb without registered SHAPE
        run: |
          set -euo pipefail
          SOURCE="$(cat evidence-build/source-directory.txt)"
          SOURCE="xserver-source/${SOURCE#./}"
          meson setup "$SOURCE/build-noshape" "$SOURCE" \
            --prefix=/usr \
            -Dxorg=false \
            -Dxnest=false \
            -Dxephyr=false \
            -Dxvfb=true \
            -Dglamor=false \
            -Dglx=false \
            -Dxdmcp=false \
            -Dxdm-auth-1=false \
            -Dsecure-rpc=false \
            -Dlisten_tcp=true \
            2>&1 | tee evidence-build/meson-setup.log
          ninja -v -C "$SOURCE/build-noshape" Xvfb \
            2>&1 | tee evidence-build/ninja-xvfb.log
          XVFB="$(find "$SOURCE/build-noshape" -type f -name Xvfb -perm -111 -print -quit)"
          test -n "$XVFB"
          install -D -m 0755 "$XVFB" output/Xvfb-no-shape
          file output/Xvfb-no-shape | tee evidence-build/xvfb-file.txt
          ldd output/Xvfb-no-shape | tee evidence-build/xvfb-ldd.txt
          nm -A output/Xvfb-no-shape 2>/dev/null \
            | grep -F ShapeExtensionInit \
            | tee evidence-build/shape-symbol.txt

      - name: Prove compiled server does not advertise SHAPE
        run: |
          set -euo pipefail
          output/Xvfb-no-shape :109 -ac -screen 0 640x480x24 -listen tcp \
            >evidence-build/xvfb-smoke.log 2>&1 &
          PID=$!
          trap 'kill "$PID" 2>/dev/null || true' EXIT
          for _ in $(seq 1 30); do
            xdpyinfo -display 127.0.0.1:109.0 >/dev/null 2>&1 && break
            sleep 1
          done
          xdpyinfo -display 127.0.0.1:109.0 \
            | tee evidence-build/xdpyinfo-no-shape.txt
          test "$(grep -c SHAPE evidence-build/xdpyinfo-no-shape.txt || true)" -eq 0
          kill "$PID"
          wait "$PID" || true
          trap - EXIT

      - name: Upload no-SHAPE build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: V18K_COMPILED_NOSHAPE_XVFB_BUILD_DIAGNOSTICS
          path: |
            evidence-build/
            output/
          if-no-files-found: warn

      - name: Upload compiled no-SHAPE Xvfb
        uses: actions/upload-artifact@v4
        with:
          name: V18K_COMPILED_NOSHAPE_XVFB_ARM64
          path: |
            output/Xvfb-no-shape
            evidence-build/
          if-no-files-found: error

  no-shape-runtime-matrix:
    needs: build-noshape-xvfb
    strategy:
      fail-fast: false
      matrix:
        variant: [v18j-baseline, xshape-restored]
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM64 runtime tools
        run: |
          set -euo pipefail
          test "$(dpkg --print-architecture)" = arm64
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            curl unzip zstd file binutils x11-utils imagemagick procps \
            gcc libx11-dev
          python3 -m py_compile tr_winlator_apk/materialize_main_wine_container.py
          bash -n tr_winlator_apk/run_v18k_noshape_variant.sh

      - name: Download compiled no-SHAPE Xvfb
        uses: actions/download-artifact@v4
        with:
          name: V18K_COMPILED_NOSHAPE_XVFB_ARM64
          path: noshape-artifact

      - name: Route harness Xorg call to compiled no-SHAPE Xvfb
        run: |
          set -euo pipefail
          test -x noshape-artifact/output/Xvfb-no-shape
          sudo install -D -m 0755 noshape-artifact/output/Xvfb-no-shape \
            /usr/local/libexec/Xvfb-no-shape
          cat > Xorg <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          if [[ "${1:-}" != :* ]]; then
            exec /usr/local/libexec/Xvfb-no-shape -help
          fi
          display="$1"
          exec /usr/local/libexec/Xvfb-no-shape "$display" \
            -ac -screen 0 1280x720x24 -listen tcp
          EOF
          sudo install -m 0755 Xorg /usr/local/bin/Xorg
          test "$(sudo sh -c 'command -v Xorg')" = /usr/local/bin/Xorg

      - name: Run exact variant on compiled no-SHAPE server
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash tr_winlator_apk/run_v18k_noshape_variant.sh '${{ matrix.variant }}'

      - name: Cleanup custom X server
        if: always()
        run: sudo pkill -KILL -f Xvfb-no-shape 2>/dev/null || true

      - name: Upload compiled no-SHAPE runtime evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: V18K_COMPILED_NOSHAPE_${{ matrix.variant }}_EVIDENCE
          path: evidence-${{ matrix.variant }}/
          if-no-files-found: warn
