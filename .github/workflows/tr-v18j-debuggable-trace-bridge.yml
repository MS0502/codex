name: TR v18J debuggable trace bridge APK

on:
  push:
    branches:
      - tr-wine-compat-proton11-xshape-restore-v18k
    paths:
      - .github/workflows/tr-v18j-debuggable-trace-bridge.yml
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  build-debuggable-bridge:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install APK rebuild tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            apktool curl unzip zip file

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android signing tools
        run: |
          set -euo pipefail
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(find "$ANDROID_HOME/cmdline-tools" -type f -name sdkmanager -print -quit)"
          fi
          test -x "$SDKMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" 'build-tools;34.0.0'

      - name: Download pinned v18J APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl --fail --location --retry 3 \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            https://api.github.com/repos/MS0502/codex/actions/artifacts/8442434345/zip \
            -o v18j-artifact.zip
          mkdir base
          unzip -q v18j-artifact.zip -d base
          BASE_APK="$(find base -type f -name '*.apk' -print -quit)"
          test -n "$BASE_APK"
          cp "$BASE_APK" base-v18j.apk
          echo '4003bcb0c863519720116d93540e161d640800692c0e002f7e8ac42434e5a215  base-v18j.apk' | sha256sum -c -
          "$ANDROID_HOME/build-tools/34.0.0/apksigner" verify --verbose --print-certs base-v18j.apk \
            | tee base-signer.txt

      - name: Decode and enable run-as only
        run: |
          set -euo pipefail
          apktool d -f base-v18j.apk -o decoded
          python3 - <<'PY'
          from pathlib import Path
          import re

          manifest = Path('decoded/AndroidManifest.xml')
          text = manifest.read_text(encoding='utf-8')
          if 'package="com.winlator.trcompat"' not in text:
              raise SystemExit('unexpected package')

          app_match = re.search(r'<application\b[^>]*>', text)
          if not app_match:
              raise SystemExit('application tag not found')
          tag = app_match.group(0)
          if 'android:debuggable=' in tag:
              tag2 = re.sub(r'android:debuggable="[^"]*"', 'android:debuggable="true"', tag)
          else:
              tag2 = tag[:-1] + ' android:debuggable="true">'
          text = text[:app_match.start()] + tag2 + text[app_match.end():]

          vc = re.search(r'android:versionCode="(\d+)"', text)
          if not vc:
              raise SystemExit('versionCode not found')
          old = int(vc.group(1))
          text = text[:vc.start(1)] + str(old + 1) + text[vc.end(1):]

          vn = re.search(r'android:versionName="([^"]*)"', text)
          if vn:
              value = vn.group(1)
              text = text[:vn.start(1)] + value + '-tracebridge' + text[vn.end(1):]

          manifest.write_text(text, encoding='utf-8')
          print(f'versionCode {old} -> {old + 1}')
          PY
          grep -F 'android:debuggable="true"' decoded/AndroidManifest.xml

      - name: Rebuild, align and sign with matching key
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: trcompat-debug-keystore-v1

      - name: Require matching signing key
        run: |
          set -euo pipefail
          test -f "$HOME/.android/debug.keystore"
          keytool -list -keystore "$HOME/.android/debug.keystore" \
            -storepass android -alias androiddebugkey >/dev/null

      - name: Package APK
        run: |
          set -euo pipefail
          apktool b decoded -o unsigned.apk
          "$ANDROID_HOME/build-tools/34.0.0/zipalign" -f -p 4 unsigned.apk aligned.apk
          mkdir -p out
          "$ANDROID_HOME/build-tools/34.0.0/apksigner" sign \
            --ks "$HOME/.android/debug.keystore" \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out out/Winlator_11.1_TR_Compat_v18J_DEBUGGABLE_TRACE_BRIDGE.apk \
            aligned.apk
          "$ANDROID_HOME/build-tools/34.0.0/apksigner" verify --verbose --print-certs \
            out/Winlator_11.1_TR_Compat_v18J_DEBUGGABLE_TRACE_BRIDGE.apk \
            | tee new-signer.txt
          grep '^Signer #1 certificate SHA-256 digest:' base-signer.txt > base-cert.txt
          grep '^Signer #1 certificate SHA-256 digest:' new-signer.txt > new-cert.txt
          diff -u base-cert.txt new-cert.txt
          "$ANDROID_HOME/build-tools/34.0.0/aapt" dump badging \
            out/Winlator_11.1_TR_Compat_v18J_DEBUGGABLE_TRACE_BRIDGE.apk \
            | tee badging.txt
          grep -F "package: name='com.winlator.trcompat'" badging.txt
          sha256sum out/*.apk | tee out/SHA256SUMS.txt

      - name: Upload debuggable bridge APK
        uses: actions/upload-artifact@v4
        with:
          name: WINLATOR_11_1_TR_COMPAT_V18J_DEBUGGABLE_TRACE_BRIDGE
          path: |
            out/*
            base-signer.txt
            new-signer.txt
            badging.txt
          if-no-files-found: error
          retention-days: 30
