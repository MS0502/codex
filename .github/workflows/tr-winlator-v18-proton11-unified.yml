name: TR Winlator compatibility APK v18 unified Proton Wine 11

on:
  push:
    branches: [tr-wine-compat-proton11-v18]
  pull_request:
    branches: [tr-wine-compat-baseline-v12]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: tr-winlator-v18-proton11-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-apk-v18-proton11:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Install packaging tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            python3 git git-lfs ca-certificates curl jq unzip xz-utils zstd patchelf file

      - name: Set up Java 17 for sdkmanager
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK components
        run: |
          set -euo pipefail
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(find "$ANDROID_HOME/cmdline-tools" -type f -name sdkmanager -print -quit)"
          fi
          test -x "$SDKMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" 'platforms;android-34' 'build-tools;34.0.0' \
            'cmake;3.22.1' 'ndk;24.0.8215888'

      - name: Set up Java 11 for Android Gradle Plugin
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Fetch exact Winlator 11.1 source
        run: |
          set -euo pipefail
          git init winlator-app
          git -C winlator-app remote add origin https://github.com/brunodev85/winlator-app.git
          git -C winlator-app fetch --depth 1 origin c2f4ad4534f4637b543a9a3b085e28f50cf6d01c
          git -C winlator-app checkout --detach FETCH_HEAD
          test "$(git -C winlator-app rev-parse HEAD)" = c2f4ad4534f4637b543a9a3b085e28f50cf6d01c
          git -C winlator-app lfs pull
          test -s winlator-app/app/src/main/assets/rootfs.tzst
          sha256sum winlator-app/app/src/main/assets/rootfs.tzst | tee rootfs-source-sha256.txt

      - name: Download exact Proton Wine 11 x86_64 Winlator component
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from __future__ import annotations
          import hashlib
          import json
          import os
          import urllib.request
          from pathlib import Path

          repo = "AndreVto/proton-wine"
          asset_name = "proton-wine-11.0-1-x86_64.wcp.xz"
          headers = {
              "Accept": "application/vnd.github+json",
              "User-Agent": "tr-winlator-v18-builder",
              "X-GitHub-Api-Version": "2022-11-28",
          }
          token = os.environ.get("GH_TOKEN", "")
          if token:
              headers["Authorization"] = f"Bearer {token}"

          matches = []
          for page in range(1, 6):
              url = f"https://api.github.com/repos/{repo}/releases?per_page=100&page={page}"
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request, timeout=60) as response:
                  releases = json.load(response)
              if not releases:
                  break
              for release in releases:
                  for asset in release.get("assets", []):
                      if asset.get("name") == asset_name:
                          matches.append((release, asset))

          if not matches:
              raise SystemExit(f"release asset not found: {repo} {asset_name}")
          matches.sort(key=lambda item: item[0].get("published_at") or "", reverse=True)
          release, asset = matches[0]

          download_headers = dict(headers)
          download_headers["Accept"] = "application/octet-stream"
          request = urllib.request.Request(asset["url"], headers=download_headers)
          output = Path(asset_name)
          digest = hashlib.sha256()
          size = 0
          with urllib.request.urlopen(request, timeout=180) as response, output.open("wb") as handle:
              while True:
                  chunk = response.read(1024 * 1024)
                  if not chunk:
                      break
                  handle.write(chunk)
                  digest.update(chunk)
                  size += len(chunk)

          actual = digest.hexdigest()
          expected_digest = asset.get("digest") or ""
          if expected_digest.startswith("sha256:") and expected_digest.split(":", 1)[1] != actual:
              raise SystemExit(f"release digest mismatch expected={expected_digest} actual=sha256:{actual}")
          if size != int(asset.get("size") or size):
              raise SystemExit(f"release size mismatch expected={asset.get('size')} actual={size}")

          metadata = {
              "repository": repo,
              "release_id": release.get("id"),
              "release_tag": release.get("tag_name"),
              "release_name": release.get("name"),
              "published_at": release.get("published_at"),
              "asset_id": asset.get("id"),
              "asset_name": asset_name,
              "asset_size": size,
              "api_digest": expected_digest,
              "sha256": actual,
              "source_commit_claim": "55f9e71 (publisher release description; verified by runtime files where available)",
          }
          Path("proton-source-metadata.json").write_text(
              json.dumps(metadata, indent=2, sort_keys=True) + "\n", encoding="utf-8"
          )
          print(json.dumps(metadata, indent=2, sort_keys=True))
          PY
          test -s proton-wine-11.0-1-x86_64.wcp.xz
          sha256sum proton-wine-11.0-1-x86_64.wcp.xz | tee proton-asset-sha256.txt

      - name: Extract and validate unified Proton Wine tree
        run: |
          set -euo pipefail
          xz -dc proton-wine-11.0-1-x86_64.wcp.xz > proton-wine-11.0-1-x86_64.wcp
          file proton-wine-11.0-1-x86_64.wcp | tee proton-wcp-file.txt
          mkdir -p proton-wcp-raw

          if file -b proton-wine-11.0-1-x86_64.wcp | grep -qi 'Zstandard'; then
            tar --use-compress-program=unzstd -xf proton-wine-11.0-1-x86_64.wcp -C proton-wcp-raw
          elif tar -tf proton-wine-11.0-1-x86_64.wcp >/dev/null 2>&1; then
            tar -xf proton-wine-11.0-1-x86_64.wcp -C proton-wcp-raw
          else
            echo 'Unsupported WCP archive format' >&2
            exit 1
          fi

          python3 - <<'PY'
          from __future__ import annotations
          import json
          import os
          import shutil
          from pathlib import Path

          raw = Path("proton-wcp-raw")
          required = (
              "bin/wine",
              "bin/wineserver",
              "lib/wine/x86_64-unix/ntdll.so",
              "lib/wine/x86_64-windows/wow64.dll",
              "lib/wine/x86_64-unix/nsiproxy.so",
              "lib/wine/x86_64-windows/ntoskrnl.exe",
          )
          candidates = []
          for wine in raw.rglob("bin/wine"):
              root = wine.parent.parent
              if all((root / relative).is_file() for relative in required):
                  candidates.append(root)
          unique = []
          seen = set()
          for candidate in candidates:
              resolved = candidate.resolve()
              if resolved not in seen:
                  seen.add(resolved)
                  unique.append(candidate)
          if len(unique) != 1:
              raise SystemExit(f"expected exactly one complete Proton Wine root, found {unique}")

          source = unique[0]
          destination = Path("proton-wine-tree")
          shutil.copytree(source, destination, symlinks=True)

          component_dir = Path("proton-components")
          component_dir.mkdir()
          mapping = {
              "ntdll.so": "lib/wine/x86_64-unix/ntdll.so",
              "wow64.dll": "lib/wine/x86_64-windows/wow64.dll",
              "wineserver": "bin/wineserver",
              "nsiproxy.so": "lib/wine/x86_64-unix/nsiproxy.so",
          }
          for name, relative in mapping.items():
              shutil.copy2(destination / relative, component_dir / name)

          manifest = {
              "archive_root": str(source),
              "tree_files": sum(1 for path in destination.rglob("*") if path.is_file()),
              "tree_symlinks": sum(1 for path in destination.rglob("*") if path.is_symlink()),
              "has_ntoskrnl": (destination / "lib/wine/x86_64-windows/ntoskrnl.exe").is_file(),
              "winedevice_candidates": [
                  str(path.relative_to(destination))
                  for path in destination.rglob("*winedevice*") if path.is_file()
              ],
          }
          Path("proton-tree-manifest.json").write_text(
              json.dumps(manifest, indent=2, sort_keys=True) + "\n", encoding="utf-8"
          )
          print(json.dumps(manifest, indent=2, sort_keys=True))
          PY

          test -x proton-wine-tree/bin/wine
          test -x proton-wine-tree/bin/wineserver
          test -s proton-wine-tree/lib/wine/x86_64-windows/ntoskrnl.exe
          find proton-wine-tree -type f -o -type l | sort | sed -n '1,120p' | tee proton-tree-sample.txt
          sha256sum proton-components/* | tee proton-components-sha256.txt
          (LD_LIBRARY_PATH="$PWD/proton-wine-tree/lib:$PWD/proton-wine-tree/lib64" \
            proton-wine-tree/bin/wine --version || true) | tee proton-wine-version.txt

      - name: Apply v18 unified Proton Wine runtime
        run: |
          set -o pipefail
          python3 tr_winlator_apk/apply_v18_patch.py \
            winlator-app proton-wine-tree proton-components 2>&1 | tee v18-apply.log
          grep -R 'versionName "11.1-trcompat18-proton11-unified"' -n winlator-app/app/build.gradle
          grep -R 'MAIN_WINE_VERSION = "11.0"' -n winlator-app/app/src/main/java/com/winlator/core/WineInfo.java
          grep -R 'TR_DIAG_v18_PROTON11.zip' -n winlator-app/app/src/main/java/com/winlator/core/TrCompatDiagnostics.java
          grep -R 'v18-proton11-unified-1' -n winlator-app/app/src/main/java/com/winlator/core/TrCompatWinePatcher.java
          grep -R 'v18-proton11-unified-1' -n winlator-app/app/src/main/java/com/winlator/core/TrCompatRootfsPatcher.java
          cat winlator-app/v18-proton-rootfs-report.txt
          mkdir -p rootfs-v18-check
          tar --use-compress-program=unzstd -xf winlator-app/app/src/main/assets/rootfs.tzst \
            -C rootfs-v18-check ./opt/wine/bin/wine ./opt/wine/bin/wineserver \
            ./opt/wine/lib/wine/x86_64-windows/ntoskrnl.exe \
            ./opt/wine/lib/wine/x86_64-unix/ntdll.so
          test -s rootfs-v18-check/opt/wine/bin/wine
          test -s rootfs-v18-check/opt/wine/bin/wineserver
          test -s rootfs-v18-check/opt/wine/lib/wine/x86_64-windows/ntoskrnl.exe
          test -s rootfs-v18-check/opt/wine/lib/wine/x86_64-unix/ntdll.so

      - name: Restore persistent debug signing key
        id: debug-key-cache
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: trcompat-debug-keystore-v1

      - name: Create debug signing key
        if: steps.debug-key-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.android"
          keytool -genkeypair -keystore "$HOME/.android/debug.keystore" \
            -storepass android -alias androiddebugkey -keypass android \
            -dname 'CN=Android Debug,O=Android,C=US' -keyalg RSA -keysize 2048 \
            -validity 10000 -noprompt
          chmod 600 "$HOME/.android/debug.keystore"

      - name: Build v18 APK
        working-directory: winlator-app
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew --no-daemon --stacktrace assembleDebug 2>&1 | tee ../apk-build-v18-proton11.log

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: WINLATOR_11_1_TR_COMPAT_V18_PROTON11_BUILD_LOG
          path: |
            apk-build-v18-proton11.log
            v18-apply.log
            rootfs-source-sha256.txt
            proton-source-metadata.json
            proton-asset-sha256.txt
            proton-wcp-file.txt
            proton-tree-manifest.json
            proton-tree-sample.txt
            proton-components-sha256.txt
            proton-wine-version.txt
            winlator-app/v18-proton-rootfs-report.txt
            winlator-app/v9-rootfs-patch-report.txt
          if-no-files-found: warn
          retention-days: 30

      - name: Collect v18 APK
        run: |
          set -euo pipefail
          mkdir -p out-v18-proton11
          cp winlator-app/app/build/outputs/apk/debug/app-debug.apk \
            out-v18-proton11/Winlator_11.1_TR_Compat_v18_PROTON11_UNIFIED.apk
          sha256sum out-v18-proton11/Winlator_11.1_TR_Compat_v18_PROTON11_UNIFIED.apk \
            | tee out-v18-proton11/SHA256SUMS.txt
          cp proton-source-metadata.json proton-asset-sha256.txt proton-tree-manifest.json \
            proton-components-sha256.txt proton-wine-version.txt \
            winlator-app/v18-proton-rootfs-report.txt out-v18-proton11/
          cp tr_winlator_apk/V18_PROTON11_RUNBOOK_KO.md out-v18-proton11/
          cat > out-v18-proton11/README_KO.txt <<'EOF'
          Winlator TR Compat v18 Proton Wine 11 통합 실행 빌드

          공식 Winlator 11.1 앱 구조와 별도 패키지/rootfs 경로 보정을 유지하되,
          /opt/wine 전체를 같은 Proton Wine 11 x86_64 배포 트리로 교체한다.
          ntdll, wow64, wineserver, ntoskrnl, winedevice 및 Wine DLL은 서로 다른
          버전에서 섞지 않는다.

          게임·인증·TalesRunner·XIGNCODE 파일과 xhunter 장치 응답은 수정하지 않는다.
          기존 TR Compat 설치 위에 덮어쓰지 말고 데이터 보존 후 삭제한 다음 새로 설치한다.
          새 컨테이너에서만 시험한다.
          EOF

      - name: Upload v18 APK
        uses: actions/upload-artifact@v4
        with:
          name: WINLATOR_11_1_TR_COMPAT_APK_V18_PROTON11_UNIFIED
          path: out-v18-proton11/*
          if-no-files-found: error
          retention-days: 30
