name: TR v18J startup-mode repaint diagnostic matrix

on:
  pull_request:
    branches: [tr-wine-compat-proton11-native-wrapper-closure-v18j]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  actions: read

jobs:
  startup-mode:
    if: github.event.pull_request.head.ref == 'tr-wine-compat-proton11-xshape-restore-v18k'
    strategy:
      fail-fast: false
      matrix:
        mode: [exact, cmd-instead-of-wfm, desktop-only, exact-nodebug]
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 35
    env:
      NOSHAPE_XVFB_ARTIFACT_ID: '8452817968'
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM64 runtime tools
        run: |
          set -euo pipefail
          test "$(dpkg --print-architecture)" = arm64
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            curl unzip zstd file binutils x11-utils imagemagick procps \
            gcc libx11-dev
          python3 -m py_compile tr_winlator_apk/materialize_main_wine_container.py
          bash -n tr_winlator_apk/run_v18k_noshape_variant.sh

      - name: Install proven true no-SHAPE X server
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p noshape-artifact
          curl --fail --location --retry 3 \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${NOSHAPE_XVFB_ARTIFACT_ID}/zip" \
            -o noshape-xvfb.zip
          unzip -q noshape-xvfb.zip -d noshape-artifact
          XVFB="$(find noshape-artifact -type f -name Xvfb-no-shape -print -quit)"
          test -n "$XVFB"
          printf '%s  %s\n' b6a9f2de820fc35b44409bfa0f863a4e5f63fcc1bbb4e52f6673033110e2668f "$XVFB" \
            | sha256sum -c -
          sudo install -D -m 0755 "$XVFB" /usr/local/libexec/Xvfb-no-shape
          cat > Xorg <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          if [[ "${1:-}" != :* ]]; then
            exec /usr/local/libexec/Xvfb-no-shape -help
          fi
          exec /usr/local/libexec/Xvfb-no-shape "$1" \
            -ac -screen 0 1280x720x24 -listen tcp
          EOF
          sudo install -D -m 0755 Xorg /usr/local/bin/Xorg

      - name: Materialize startup-mode runner
        env:
          STARTUP_MODE: ${{ matrix.mode }}
        run: |
          set -euo pipefail
          cp tr_winlator_apk/run_v18k_noshape_variant.sh runner.sh
          python3 - <<'PY'
          import os
          from pathlib import Path

          mode = os.environ['STARTUP_MODE']
          path = Path('runner.sh')
          text = path.read_text(encoding='utf-8')
          text = text.replace('EVIDENCE="evidence-${VARIANT}"', f'EVIDENCE="evidence-{mode}"')
          exact = "  'C:\\windows\\winhandler.exe' /dir 'C:\\windows' 'wfm.exe' \\\n"
          if exact not in text:
              raise SystemExit('exact Winlator startup command anchor missing')
          if mode == 'cmd-instead-of-wfm':
              text = text.replace(exact, "  'C:\\windows\\winhandler.exe' /dir 'C:\\windows' 'cmd.exe' \\\n", 1)
          elif mode == 'desktop-only':
              text = text.replace(exact, '', 1)
          elif mode == 'exact-nodebug':
              anchor = 'WINEPREFIX=/home/xuser/.wine WINEDEBUG=warn+all,err+all \\\n'
              if anchor not in text:
                  raise SystemExit('WINEDEBUG anchor missing')
              text = text.replace(anchor, 'WINEPREFIX=/home/xuser/.wine WINEDEBUG=-all \\\n', 1)
          elif mode != 'exact':
              raise SystemExit(f'unknown mode {mode}')

          # This matrix is diagnostic: absence of a Computer window is a result,
          # not a harness failure for modes that intentionally omit wfm.exe.
          text = text.replace('test "$computer" -ge 5\n', 'true # diagnostic matrix records computer count\n', 1)
          path.write_text(text, encoding='utf-8')
          PY
          bash -n runner.sh
          grep -n -A4 -B2 'explorer /desktop' runner.sh | tee runner-command.txt
          grep -n 'WINEDEBUG=' runner.sh | tee runner-winedebug.txt

      - name: Run startup mode for 60 seconds
        env:
          GH_TOKEN: ${{ github.token }}
          STARTUP_MODE: ${{ matrix.mode }}
        run: |
          set -euo pipefail
          PATH="/usr/local/bin:$PATH" bash runner.sh v18j-baseline
          EVIDENCE="evidence-${STARTUP_MODE}"
          printf 'startup_mode=%s\n' "$STARTUP_MODE" >> "$EVIDENCE/result.txt"
          printf 'erasebkgnd_count=%s\n' "$(grep -c 'pack_message msg 14' "$EVIDENCE/wine.log" || true)" \
            >> "$EVIDENCE/result.txt"
          printf 'shell_tray_count=%s\n' "$(grep -Ehic 'Shell_TrayWnd|taskbar' "$EVIDENCE"/xwininfo-*.txt || true)" \
            >> "$EVIDENCE/result.txt"
          printf 'wine_log_lines=%s\n' "$(wc -l < "$EVIDENCE/wine.log")" \
            >> "$EVIDENCE/result.txt"
          cat "$EVIDENCE/result.txt"

      - name: Cleanup runtime
        if: always()
        run: |
          sudo pkill -KILL -f Xvfb-no-shape 2>/dev/null || true
          sudo pkill -KILL box64 2>/dev/null || true

      - name: Upload startup-mode evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: V18J_STARTUP_MODE_${{ matrix.mode }}_EVIDENCE
          path: |
            evidence-${{ matrix.mode }}/
            runner-command.txt
            runner-winedebug.txt
          if-no-files-found: warn
