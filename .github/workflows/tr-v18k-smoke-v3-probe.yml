name: Report v18K ARM64 baseline v3

on:
  push:
    branches: [tr-wine-compat-proton11-xshape-restore-v18k]
    paths: [.github/workflows/tr-v18k-smoke-v3-probe.yml]

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  report:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Report concise v3 result
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          API="repos/${GITHUB_REPOSITORY}/actions/workflows/tr-v18k-arm64-runtime-smoke-v3.yml/runs?branch=tr-wine-compat-proton11-xshape-restore-v18k&per_page=3"
          RUN=''
          for _ in $(seq 1 70); do
            RUN="$(gh api "$API" --jq '.workflow_runs[0] // empty')"
            if [ -n "$RUN" ] && [ "$(jq -r .status <<<"$RUN")" = completed ]; then break; fi
            sleep 15
          done
          if [ -z "$RUN" ]; then
            BODY='ARM64 Explorer baseline v3 did not start.'
          else
            ID="$(jq -r .id <<<"$RUN")"
            CONCLUSION="$(jq -r .conclusion <<<"$RUN")"
            JOB="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${ID}/jobs" --jq '.jobs[0] | {id,name,status,conclusion,steps:[.steps[] | {name,conclusion}]}')"
            ART="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${ID}/artifacts" --jq '[.artifacts[] | {id,name,size_in_bytes}]')"
            BODY="ARM64 Explorer baseline v3: **${CONCLUSION}**\n\nRun ID: ${ID}\n\n\`\`\`json\n${JOB}\n\`\`\`\n\nArtifacts: \`${ART}\`"
          fi
          gh api "repos/${GITHUB_REPOSITORY}/issues/19/comments" -f body="$BODY"
