name: TR Winlator v18b Valve Proton 11 glibc APK

on:
  push:
    branches: [tr-wine-compat-proton11-glibc-v18b]
  pull_request:
    branches: [tr-wine-compat-baseline-v12]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: tr-winlator-v18b-proton11-glibc-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-apk-v18b-proton11-glibc:
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - name: Install packaging tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            python3 git git-lfs ca-certificates curl jq unzip xz-utils zstd \
            patchelf file binutils

      - name: Set up Java 17 for sdkmanager
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK components
        run: |
          set -euo pipefail
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(find "$ANDROID_HOME/cmdline-tools" -type f -name sdkmanager -print -quit)"
          fi
          test -x "$SDKMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" 'platforms;android-34' 'build-tools;34.0.0' \
            'cmake;3.22.1' 'ndk;24.0.8215888'

      - name: Set up Java 11 for Android Gradle Plugin
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Fetch exact Winlator 11.1 source
        run: |
          set -euo pipefail
          git init winlator-app
          git -C winlator-app remote add origin https://github.com/brunodev85/winlator-app.git
          git -C winlator-app fetch --depth 1 origin c2f4ad4534f4637b543a9a3b085e28f50cf6d01c
          git -C winlator-app checkout --detach FETCH_HEAD
          test "$(git -C winlator-app rev-parse HEAD)" = c2f4ad4534f4637b543a9a3b085e28f50cf6d01c
          git -C winlator-app lfs pull
          test -s winlator-app/app/src/main/assets/rootfs.tzst
          sha256sum winlator-app/app/src/main/assets/rootfs.tzst | tee rootfs-source-sha256.txt

      - name: Download exact Valve Proton 11 beta5 release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from __future__ import annotations
          import hashlib
          import json
          import os
          import urllib.request
          from pathlib import Path

          repo = "ValveSoftware/Proton"
          tag = "proton-11.0-1-beta5"
          headers = {
              "Accept": "application/vnd.github+json",
              "User-Agent": "tr-winlator-v18b-builder",
              "X-GitHub-Api-Version": "2022-11-28",
          }
          token = os.environ.get("GH_TOKEN", "")
          if token:
              headers["Authorization"] = f"Bearer {token}"

          request = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/releases/tags/{tag}",
              headers=headers,
          )
          with urllib.request.urlopen(request, timeout=60) as response:
              release = json.load(response)

          candidates = [
              asset for asset in release.get("assets", [])
              if asset.get("name", "").endswith(".tar.gz")
              and "sha" not in asset.get("name", "").lower()
          ]
          if len(candidates) != 1:
              names = [asset.get("name") for asset in release.get("assets", [])]
              raise SystemExit(f"expected one Proton tar.gz asset, found {candidates}; all={names}")
          asset = candidates[0]

          download_headers = dict(headers)
          download_headers["Accept"] = "application/octet-stream"
          request = urllib.request.Request(asset["url"], headers=download_headers)
          output = Path(asset["name"])
          digest = hashlib.sha256()
          size = 0
          with urllib.request.urlopen(request, timeout=300) as response, output.open("wb") as handle:
              for chunk in iter(lambda: response.read(1024 * 1024), b""):
                  handle.write(chunk)
                  digest.update(chunk)
                  size += len(chunk)

          expected_size = int(asset.get("size") or size)
          if size != expected_size:
              raise SystemExit(f"release size mismatch expected={expected_size} actual={size}")
          actual = digest.hexdigest()
          api_digest = asset.get("digest") or ""
          if api_digest.startswith("sha256:") and api_digest.split(":", 1)[1] != actual:
              raise SystemExit(f"release digest mismatch expected={api_digest} actual=sha256:{actual}")

          metadata = {
              "repository": repo,
              "tag": tag,
              "release_id": release.get("id"),
              "published_at": release.get("published_at"),
              "asset_id": asset.get("id"),
              "asset_name": asset.get("name"),
              "asset_size": size,
              "api_digest": api_digest,
              "sha256": actual,
          }
          Path("proton-source-metadata.json").write_text(
              json.dumps(metadata, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          Path("proton-asset-name.txt").write_text(asset["name"] + "\n", encoding="utf-8")
          print(json.dumps(metadata, indent=2, sort_keys=True))
          PY
          ASSET="$(cat proton-asset-name.txt)"
          test -s "$ASSET"
          sha256sum "$ASSET" | tee proton-asset-sha256.txt

      - name: Extract and normalize Valve Proton glibc tree
        run: |
          set -euo pipefail
          ASSET="$(cat proton-asset-name.txt)"
          mkdir -p proton-release
          tar -xzf "$ASSET" -C proton-release

          python3 - <<'PY'
          from __future__ import annotations
          import json
          import os
          import shutil
          from pathlib import Path

          raw = Path("proton-release")
          candidates = []
          for wine in raw.rglob("files/bin/wine"):
              files = wine.parent.parent
              required_any = (
                  files / "bin/wineserver",
                  files / "lib64/wine/x86_64-unix/ntdll.so",
                  files / "lib64/wine/x86_64-windows/wow64.dll",
                  files / "lib64/wine/x86_64-windows/ntoskrnl.exe",
              )
              if all(path.is_file() for path in required_any):
                  candidates.append(files)
          unique = []
          seen = set()
          for candidate in candidates:
              resolved = candidate.resolve()
              if resolved not in seen:
                  seen.add(resolved)
                  unique.append(candidate)
          if len(unique) != 1:
              raise SystemExit(f"expected exactly one Valve Proton files tree, found {unique}")

          source = unique[0]
          destination = Path("proton-wine-tree")
          shutil.copytree(source, destination, symlinks=True)

          compat_wine = destination / "lib/wine"
          compat_wine.mkdir(parents=True, exist_ok=True)
          for dirname in ("x86_64-unix", "x86_64-windows"):
              target = compat_wine / dirname
              source_dir = destination / "lib64/wine" / dirname
              if not source_dir.is_dir():
                  raise SystemExit(f"missing Valve Proton directory: {source_dir}")
              if target.exists() or target.is_symlink():
                  if target.is_symlink() or target.is_file():
                      target.unlink()
                  else:
                      shutil.rmtree(target)
              target.symlink_to(Path("../../lib64/wine") / dirname)

          required = (
              "bin/wine",
              "bin/wineserver",
              "lib/wine/x86_64-unix/ntdll.so",
              "lib/wine/x86_64-windows/wow64.dll",
              "lib/wine/x86_64-unix/nsiproxy.so",
              "lib/wine/x86_64-windows/ntoskrnl.exe",
          )
          missing = [relative for relative in required if not (destination / relative).is_file()]
          if missing:
              raise SystemExit(f"normalized Proton tree missing files: {missing}")

          component_dir = Path("proton-components")
          component_dir.mkdir()
          mapping = {
              "ntdll.so": "lib/wine/x86_64-unix/ntdll.so",
              "wow64.dll": "lib/wine/x86_64-windows/wow64.dll",
              "wineserver": "bin/wineserver",
              "nsiproxy.so": "lib/wine/x86_64-unix/nsiproxy.so",
          }
          for name, relative in mapping.items():
              shutil.copy2((destination / relative).resolve(), component_dir / name)

          manifest = {
              "release_files_root": str(source),
              "tree_files": sum(1 for path in destination.rglob("*") if path.is_file()),
              "tree_symlinks": sum(1 for path in destination.rglob("*") if path.is_symlink()),
              "wine_link": os.readlink(destination / "bin/wine")
                  if (destination / "bin/wine").is_symlink() else "",
              "winedevice_candidates": [
                  str(path.relative_to(destination))
                  for path in destination.rglob("*winedevice*") if path.is_file()
              ],
          }
          Path("proton-tree-manifest.json").write_text(
              json.dumps(manifest, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(manifest, indent=2, sort_keys=True))
          PY

          test -x proton-wine-tree/bin/wine
          test -x proton-wine-tree/bin/wineserver
          test -s proton-wine-tree/lib/wine/x86_64-windows/ntoskrnl.exe
          sha256sum proton-components/* | tee proton-components-sha256.txt

      - name: Prove glibc ABI before embedding
        run: |
          set -euo pipefail
          WINE_REAL="$(readlink -f proton-wine-tree/bin/wine)"
          file "$WINE_REAL" | tee proton-wine-file.txt
          readelf -h "$WINE_REAL" | tee proton-wine-elf-header.txt
          readelf -d "$WINE_REAL" | tee proton-wine-dynamic.txt
          readelf -Ws "$WINE_REAL" | tee proton-wine-symbols.txt

          if grep -w '__libc_init' proton-wine-symbols.txt; then
            echo 'Bionic-only __libc_init dependency detected; refusing to build.' >&2
            exit 1
          fi
          if ! grep -F 'Shared library: [libc.so.6]' proton-wine-dynamic.txt; then
            echo 'Expected glibc libc.so.6 dependency not found.' >&2
            exit 1
          fi

          LD_LIBRARY_PATH="$PWD/proton-wine-tree/lib64:$PWD/proton-wine-tree/lib:$PWD/proton-wine-tree/lib64/wine/x86_64-unix" \
            proton-wine-tree/bin/wine --version | tee proton-wine-version.txt

      - name: Apply and verify v18b Valve Proton glibc runtime
        run: |
          set -euo pipefail
          python3 tr_winlator_apk/apply_v18b_patch.py \
            winlator-app proton-wine-tree proton-components 2>&1 | tee v18b-apply.log

          grep -F 'versionName "11.1-trcompat18b-proton11-valve-glibc"' winlator-app/app/build.gradle
          grep -F 'MAIN_WINE_VERSION = "11.0"' winlator-app/app/src/main/java/com/winlator/core/WineInfo.java
          grep -F 'TR_DIAG_v18B_PROTON11_GLIBC.zip' winlator-app/app/src/main/java/com/winlator/core/TrCompatDiagnostics.java
          grep -F 'v18b-proton11-valve-glibc-1' winlator-app/app/src/main/java/com/winlator/core/TrCompatWinePatcher.java
          grep -F 'v18b-proton11-valve-glibc-1' winlator-app/app/src/main/java/com/winlator/core/TrCompatRootfsPatcher.java
          cat winlator-app/v18b-proton-rootfs-report.txt

          tar --use-compress-program=unzstd -tf winlator-app/app/src/main/assets/rootfs.tzst \
            | sed 's#^\./##' > rootfs-v18b-file-list.txt
          grep -Fx 'opt/wine/bin/wine' rootfs-v18b-file-list.txt
          grep -Fx 'opt/wine/bin/wineserver' rootfs-v18b-file-list.txt
          grep -Fx 'opt/wine/lib/wine/x86_64-windows/ntoskrnl.exe' rootfs-v18b-file-list.txt
          grep -Fx 'opt/wine/lib/wine/x86_64-unix/ntdll.so' rootfs-v18b-file-list.txt
          grep -Fx 'opt/wine/lib/wine/x86_64-windows/wow64.dll' rootfs-v18b-file-list.txt

      - name: Restore persistent debug signing key
        id: debug-key-cache
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: trcompat-debug-keystore-v1

      - name: Create debug signing key
        if: steps.debug-key-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.android"
          keytool -genkeypair -keystore "$HOME/.android/debug.keystore" \
            -storepass android -alias androiddebugkey -keypass android \
            -dname 'CN=Android Debug,O=Android,C=US' -keyalg RSA -keysize 2048 \
            -validity 10000 -noprompt
          chmod 600 "$HOME/.android/debug.keystore"

      - name: Build v18b APK
        working-directory: winlator-app
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew --no-daemon --stacktrace assembleDebug 2>&1 | tee ../apk-build-v18b-proton11-glibc.log

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: WINLATOR_11_1_TR_COMPAT_V18B_PROTON11_GLIBC_BUILD_LOG
          path: |
            apk-build-v18b-proton11-glibc.log
            v18b-apply.log
            rootfs-source-sha256.txt
            proton-source-metadata.json
            proton-asset-name.txt
            proton-asset-sha256.txt
            proton-tree-manifest.json
            proton-components-sha256.txt
            proton-wine-file.txt
            proton-wine-elf-header.txt
            proton-wine-dynamic.txt
            proton-wine-symbols.txt
            proton-wine-version.txt
            rootfs-v18b-file-list.txt
            winlator-app/v18b-proton-rootfs-report.txt
            winlator-app/v18-proton-rootfs-report.txt
            winlator-app/v9-rootfs-patch-report.txt
          if-no-files-found: warn
          retention-days: 30

      - name: Collect v18b APK
        run: |
          set -euo pipefail
          mkdir -p out-v18b
          cp winlator-app/app/build/outputs/apk/debug/app-debug.apk \
            out-v18b/Winlator_11.1_TR_Compat_v18B_PROTON11_VALVE_GLIBC.apk
          sha256sum out-v18b/Winlator_11.1_TR_Compat_v18B_PROTON11_VALVE_GLIBC.apk \
            | tee out-v18b/SHA256SUMS.txt
          cp proton-source-metadata.json proton-asset-sha256.txt proton-tree-manifest.json \
            proton-wine-file.txt proton-wine-dynamic.txt proton-wine-version.txt \
            winlator-app/v18b-proton-rootfs-report.txt out-v18b/
          cat > out-v18b/README_KO.txt <<'EOF'
          Winlator TR Compat v18b - Valve Proton 11 beta5 glibc

          v18의 Bionic 전용 Wine 실행 파일이 glibc Winlator에서 __libc_init 심볼
          누락으로 종료코드 134를 낸 문제를 제거한 빌드다.

          Valve 공식 Proton 11 beta5의 Linux glibc x86_64 files 트리를 사용하고,
          APK 빌드 전에 libc.so.6 의존성과 __libc_init 부재를 검증한다.

          현재 v18 앱과 컨테이너를 재사용하지 않는다. 필요한 파일을 보존한 뒤
          com.winlator.trcompat를 삭제하고 이 APK를 새로 설치한다.
          새 TR_KR_V18B 컨테이너에서만 실행한다.
          EOF

      - name: Upload v18b APK
        uses: actions/upload-artifact@v4
        with:
          name: WINLATOR_11_1_TR_COMPAT_APK_V18B_PROTON11_VALVE_GLIBC
          path: out-v18b/*
          if-no-files-found: error
          retention-days: 30
