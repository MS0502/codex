name: Fix v18g exact wineserver source patch v3

on:
  push:
    branches: [tr-wine-compat-proton11-android-tmp-v18g]
    paths:
      - '.github/workflows/tr-v18g-exact-request-fix-v3.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-workflow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: tr-wine-compat-proton11-android-tmp-v18g

      - name: Replace guessed patch with exact request.c patch
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import base64

          path = Path('.github/workflows/tr-winlator-v18g-proton11-android-tmp.yml')
          text = path.read_text(encoding='utf-8')
          start_marker = '      - name: Patch wineserver temp root for Android sandbox\n'
          end_marker = '      - name: Configure official Proton SDK\n'
          start = text.find(start_marker)
          end = text.find(end_marker, start)
          if start < 0 or end < 0:
              raise SystemExit('patch-step markers not found')

          new_step = base64.b64decode('').decode('utf-8')
          text = text[:start] + new_step + text[end:]

          old_verify = base64.b64decode('ICAgICAgICAgIHN0cmluZ3MgIiRTT1VSQ0UvYmluL3dpbmVzZXJ2ZXIiIHwgZ3JlcCAtRiAnL2RhdGEvdXNlci8wL2NvbS53aW5sYXRvci50cmNvbXBhdC9yL3RtcC8ud2luZScgXAogICAgICAgICAgICB8IHRlZSBwcm90b24td2luZXNlcnZlci1zdHJpbmctY2hlY2sudHh0Cg==').decode('utf-8')
          new_verify = base64.b64decode('').decode('utf-8')
          if text.count(old_verify) != 1:
              raise SystemExit('compiled-wineserver verification anchor not found exactly once')
          text = text.replace(old_verify, new_verify, 1)

          diag_anchor = '            proton-wineserver-string-check.txt\n'
          if text.count(diag_anchor) != 1:
              raise SystemExit('diagnostics anchor count is not one')
          text = text.replace(diag_anchor, diag_anchor + '            proton-wineserver-strings.txt\n', 1)
          path.write_text(text, encoding='utf-8')
          PY

          grep -F 'Patch exact Proton 11 wineserver temp-root branch' \
            .github/workflows/tr-winlator-v18g-proton11-android-tmp.yml
          if grep -F 'server_root_prefix' \
            .github/workflows/tr-winlator-v18g-proton11-android-tmp.yml; then
            echo 'obsolete guessed patch remains' >&2
            exit 1
          fi

      - name: Commit corrected build workflow
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/workflows/tr-winlator-v18g-proton11-android-tmp.yml
          git commit -m 'patch exact Proton 11 request.c wineserver path'
          git push origin HEAD:tr-wine-compat-proton11-android-tmp-v18g
