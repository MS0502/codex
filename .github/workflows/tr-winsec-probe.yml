name: TR Windows Security API Probe

on:
  push:
    branches:
      - tr-xign-api-probe
    paths:
      - 'tr_xign_api_probe/**'
      - '.github/workflows/tr-winsec-probe.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'tr_xign_api_probe/**'
      - '.github/workflows/tr-winsec-probe.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-run:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Locate Visual Studio
        id: vs
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $install = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $install) { throw "Visual Studio C++ toolchain not found" }
          "install=$install" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build x64
        shell: cmd
        run: |
          call "${{ steps.vs.outputs.install }}\VC\Auxiliary\Build\vcvarsall.bat" x64
          if not exist out mkdir out
          cl /nologo /W4 /O2 /MT /D_CRT_SECURE_NO_WARNINGS /Fe:out\TR_WINSEC_PROBE_x64.exe tr_xign_api_probe\tr_winsec_probe.c advapi32.lib

      - name: Build x86
        shell: cmd
        run: |
          call "${{ steps.vs.outputs.install }}\VC\Auxiliary\Build\vcvarsall.bat" x86
          cl /nologo /W4 /O2 /MT /D_CRT_SECURE_NO_WARNINGS /Fe:out\TR_WINSEC_PROBE_x86.exe tr_xign_api_probe\tr_winsec_probe.c advapi32.lib

      - name: Run probes on native Windows
        shell: pwsh
        run: |
          & .\out\TR_WINSEC_PROBE_x64.exe .\out\windows_reference_x64.txt
          if ($LASTEXITCODE -ne 0) { throw "x64 probe failed: $LASTEXITCODE" }
          & .\out\TR_WINSEC_PROBE_x86.exe .\out\windows_reference_x86.txt
          if ($LASTEXITCODE -ne 0) { throw "x86 probe failed: $LASTEXITCODE" }
          Get-FileHash .\out\TR_WINSEC_PROBE_x64.exe -Algorithm SHA256 | Format-List | Out-File .\out\sha256.txt
          Get-FileHash .\out\TR_WINSEC_PROBE_x86.exe -Algorithm SHA256 | Format-List | Out-File .\out\sha256.txt -Append
          "=== x64 ==="
          Get-Content .\out\windows_reference_x64.txt
          "=== x86 ==="
          Get-Content .\out\windows_reference_x86.txt
          "=== SHA256 ==="
          Get-Content .\out\sha256.txt

      - name: Upload probe and reference output
        uses: actions/upload-artifact@v4
        with:
          name: TR_WINSEC_PROBE_WINDOWS_REFERENCE
          path: out/*
          if-no-files-found: error
          retention-days: 30

      - name: Publish bundle on probe branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/tr-xign-api-probe'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force downloads | Out-Null
          $bundle = 'downloads/TR_WINSEC_PROBE_WINDOWS_REFERENCE.zip'
          if (Test-Path $bundle) { Remove-Item $bundle -Force }
          Compress-Archive -Path out\* -DestinationPath $bundle -CompressionLevel Optimal
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add $bundle
          if (git diff --cached --quiet) {
            Write-Host 'Probe bundle unchanged.'
          } else {
            git commit -m 'Publish Windows security API probe bundle'
            git push origin HEAD:tr-xign-api-probe
          }
