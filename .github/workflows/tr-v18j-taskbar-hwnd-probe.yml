name: TR v18J in-Wine taskbar HWND probe

on:
  pull_request:
    branches: [tr-wine-compat-proton11-native-wrapper-closure-v18j]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  actions: read

jobs:
  taskbar-hwnd-probe:
    if: github.event.pull_request.head.ref == 'tr-wine-compat-proton11-xshape-restore-v18k'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 35
    env:
      NOSHAPE_XVFB_ARTIFACT_ID: '8452817968'
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM64 and MinGW probe tools
        run: |
          set -euo pipefail
          test "$(dpkg --print-architecture)" = arm64
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            curl unzip zstd file binutils x11-utils imagemagick procps \
            gcc libx11-dev gcc-mingw-w64-x86-64
          python3 -m py_compile tr_winlator_apk/materialize_main_wine_container.py
          bash -n tr_winlator_apk/run_v18k_noshape_variant.sh

      - name: Build Windows taskbar probe
        run: |
          set -euo pipefail
          cat > taskbar_probe.c <<'EOF'
          #define WIN32_LEAN_AND_MEAN
          #include <windows.h>
          #include <stdio.h>

          static unsigned int child_count;
          static unsigned int button_count;
          static unsigned int id_zero_button_count;

          static void print_wide(const WCHAR *value)
          {
              char buffer[512];
              int written;
              if (!value || !value[0]) { fputs("<empty>", stdout); return; }
              written = WideCharToMultiByte(CP_UTF8, 0, value, -1, buffer, sizeof(buffer), NULL, NULL);
              if (written <= 0) fputs("<conversion-failed>", stdout);
              else fputs(buffer, stdout);
          }

          static BOOL CALLBACK enum_child(HWND hwnd, LPARAM unused)
          {
              WCHAR class_name[128] = {0};
              WCHAR title[256] = {0};
              RECT rect = {0};
              LONG_PTR id;
              DWORD pid = 0;
              DWORD tid;
              (void)unused;

              child_count++;
              GetClassNameW(hwnd, class_name, 128);
              GetWindowTextW(hwnd, title, 256);
              GetWindowRect(hwnd, &rect);
              id = GetWindowLongPtrW(hwnd, GWLP_ID);
              tid = GetWindowThreadProcessId(hwnd, &pid);
              if (!lstrcmpiW(class_name, L"Button"))
              {
                  button_count++;
                  if (!id) id_zero_button_count++;
              }

              printf("CHILD hwnd=%p visible=%d enabled=%d id=%lld tid=%lu pid=%lu rect=%ld,%ld,%ld,%ld class=",
                     (void *)hwnd, IsWindowVisible(hwnd), IsWindowEnabled(hwnd), (long long)id,
                     (unsigned long)tid, (unsigned long)pid,
                     rect.left, rect.top, rect.right, rect.bottom);
              print_wide(class_name);
              fputs(" title=", stdout);
              print_wide(title);
              fputc('\n', stdout);
              return TRUE;
          }

          int main(void)
          {
              HWND tray = FindWindowW(L"Shell_TrayWnd", NULL);
              RECT rect = {0};
              WCHAR title[256] = {0};
              DWORD pid = 0;
              DWORD tid = 0;
              LONG_PTR style = 0;
              LONG_PTR exstyle = 0;

              SetConsoleOutputCP(CP_UTF8);
              printf("PROBE pid=%lu tick=%llu\n", (unsigned long)GetCurrentProcessId(),
                     (unsigned long long)GetTickCount64());
              printf("TRAY_FOUND=%d hwnd=%p\n", tray != NULL, (void *)tray);
              if (!tray) return 3;

              tid = GetWindowThreadProcessId(tray, &pid);
              GetWindowRect(tray, &rect);
              GetWindowTextW(tray, title, 256);
              style = GetWindowLongPtrW(tray, GWL_STYLE);
              exstyle = GetWindowLongPtrW(tray, GWL_EXSTYLE);
              printf("TRAY visible=%d enabled=%d iconic=%d zoomed=%d tid=%lu pid=%lu rect=%ld,%ld,%ld,%ld width=%ld height=%ld style=0x%llx exstyle=0x%llx title=",
                     IsWindowVisible(tray), IsWindowEnabled(tray), IsIconic(tray), IsZoomed(tray),
                     (unsigned long)tid, (unsigned long)pid,
                     rect.left, rect.top, rect.right, rect.bottom,
                     rect.right - rect.left, rect.bottom - rect.top,
                     (unsigned long long)style, (unsigned long long)exstyle);
              print_wide(title);
              fputc('\n', stdout);

              EnumChildWindows(tray, enum_child, 0);
              printf("SUMMARY child_count=%u button_count=%u id_zero_button_count=%u\n",
                     child_count, button_count, id_zero_button_count);
              fflush(stdout);
              return id_zero_button_count ? 0 : 4;
          }
          EOF
          x86_64-w64-mingw32-gcc -O2 -Wall -Wextra -mconsole \
            taskbar_probe.c -o taskbar_probe.exe
          file taskbar_probe.exe | tee taskbar-probe-file.txt
          sha256sum taskbar_probe.exe | tee taskbar-probe-sha256.txt
          x86_64-w64-mingw32-objdump -p taskbar_probe.exe \
            | grep -E 'DLL Name|FindWindowW|EnumChildWindows|GetWindowRect' \
            | tee taskbar-probe-imports.txt

      - name: Install proven true no-SHAPE X server
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p noshape-artifact
          curl --fail --location --retry 3 \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${NOSHAPE_XVFB_ARTIFACT_ID}/zip" \
            -o noshape-xvfb.zip
          unzip -q noshape-xvfb.zip -d noshape-artifact
          XVFB="$(find noshape-artifact -type f -name Xvfb-no-shape -print -quit)"
          test -n "$XVFB"
          printf '%s  %s\n' b6a9f2de820fc35b44409bfa0f863a4e5f63fcc1bbb4e52f6673033110e2668f "$XVFB" \
            | sha256sum -c -
          sudo install -D -m 0755 "$XVFB" /usr/local/libexec/Xvfb-no-shape
          cat > Xorg <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          if [[ "${1:-}" != :* ]]; then
            exec /usr/local/libexec/Xvfb-no-shape -help
          fi
          exec /usr/local/libexec/Xvfb-no-shape "$1" \
            -ac -screen 0 1280x720x24 -listen tcp
          EOF
          sudo install -D -m 0755 Xorg /usr/local/bin/Xorg

      - name: Materialize exact shell runner with taskbar probes
        run: |
          set -euo pipefail
          cp tr_winlator_apk/run_v18k_noshape_variant.sh runner.sh
          python3 - <<'PY'
          from pathlib import Path

          path = Path('runner.sh')
          text = path.read_text(encoding='utf-8')
          text = text.replace('EVIDENCE="evidence-${VARIANT}"', 'EVIDENCE="evidence-taskbar-probe"', 1)

          copy_anchor = 'sudo cp -a prefix/.wine rootfs/home/xuser/.wine\n'
          if copy_anchor not in text:
              raise SystemExit('prefix copy anchor missing')
          text = text.replace(
              copy_anchor,
              copy_anchor + 'sudo cp -f taskbar_probe.exe rootfs/home/xuser/.wine/drive_c/taskbar_probe.exe\n',
              1,
          )

          pid_anchor = 'RUNTIME_PID=$!\n\n'
          if pid_anchor not in text:
              raise SystemExit('runtime pid anchor missing')
          probe = r'''RUNTIME_PID=$!

          run_taskbar_probe() {
            local label="$1"
            sudo env HOME=/home/xuser USER=xuser DISPLAY="$TCP_DISPLAY" XAUTHORITY=/dev/null \
              WINEPREFIX=/home/xuser/.wine WINEDEBUG=-all \
              WINEESYNC=1 WINE_DO_NOT_CREATE_DXGI_DEVICE_MANAGER=1 \
              MESA_DEBUG=silent MESA_NO_ERROR=1 \
              PATH=/opt/wine/bin:/usr/local/bin:/usr/bin:/bin \
              LD_LIBRARY_PATH=/lib:/usr/lib:/usr/lib/aarch64-linux-gnu \
              BOX64_NOBANNER=1 BOX64_LOG=0 BOX64_DYNAREC=1 \
              BOX64_PATH=/opt/wine/bin:/usr/bin:/bin \
              BOX64_LD_LIBRARY_PATH=/opt/wine/lib:/usr/lib:/lib \
              /usr/sbin/chroot rootfs /usr/local/bin/box64 /opt/wine/bin/wine \
              'C:\taskbar_probe.exe' \
              > "$EVIDENCE/taskbar-probe-${label}.txt" 2>&1 || true
          }

          (
            sleep 12
            run_taskbar_probe 12s
            sleep 38
            run_taskbar_probe 50s
          ) &
          TASKBAR_PROBE_PID=$!

          '''
          text = text.replace(pid_anchor, probe, 1)

          wait_anchor = 'kill "$RUNTIME_PID" 2>/dev/null || true\n'
          if wait_anchor not in text:
              raise SystemExit('runtime kill anchor missing')
          text = text.replace(
              wait_anchor,
              'wait "$TASKBAR_PROBE_PID" || true\n' + wait_anchor,
              1,
          )
          path.write_text(text, encoding='utf-8')
          PY
          bash -n runner.sh
          grep -n -A35 -B3 'run_taskbar_probe' runner.sh | tee taskbar-runner-injection.txt

      - name: Run exact Winlator shell and inspect taskbar HWND
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PATH="/usr/local/bin:$PATH" bash runner.sh v18j-baseline
          EVIDENCE=evidence-taskbar-probe
          cat "$EVIDENCE"/taskbar-probe-12s.txt
          cat "$EVIDENCE"/taskbar-probe-50s.txt
          grep -F 'TRAY_FOUND=1' "$EVIDENCE"/taskbar-probe-12s.txt
          grep -F 'TRAY_FOUND=1' "$EVIDENCE"/taskbar-probe-50s.txt
          grep -E 'SUMMARY .*id_zero_button_count=[1-9]' "$EVIDENCE"/taskbar-probe-12s.txt
          grep -E 'SUMMARY .*id_zero_button_count=[1-9]' "$EVIDENCE"/taskbar-probe-50s.txt

      - name: Cleanup runtime
        if: always()
        run: |
          sudo pkill -KILL -f Xvfb-no-shape 2>/dev/null || true
          sudo pkill -KILL box64 2>/dev/null || true

      - name: Upload taskbar evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: V18J_TASKBAR_HWND_PROBE_EVIDENCE
          path: |
            evidence-taskbar-probe/
            taskbar-probe-file.txt
            taskbar-probe-sha256.txt
            taskbar-probe-imports.txt
            taskbar-runner-injection.txt
          if-no-files-found: warn
