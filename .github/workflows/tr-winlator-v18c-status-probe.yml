name: TR Winlator v18c status probe

on:
  pull_request:
    branches: [tr-wine-compat-baseline-v12]
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  probe-v18c:
    runs-on: ubuntu-24.04
    steps:
      - name: Query latest v18c workflow run
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          WORKFLOW='tr-winlator-v18c-proton11-steam-glibc.yml'
          BRANCH='tr-wine-compat-proton11-glibc-v18b'
          JSON="$(gh api \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/$GH_REPO/actions/workflows/$WORKFLOW/runs?branch=$BRANCH&per_page=1")"
          echo "$JSON" | jq '{total_count, latest: (.workflow_runs[0] // null) | if . == null then null else {id, name, status, conclusion, run_number, event, head_sha, html_url, created_at, updated_at} end}'
          COUNT="$(echo "$JSON" | jq -r '.total_count')"
          if [ "$COUNT" = 0 ]; then
            echo 'V18C_STATE=NO_RUN'
            exit 2
          fi
          STATUS="$(echo "$JSON" | jq -r '.workflow_runs[0].status')"
          CONCLUSION="$(echo "$JSON" | jq -r '.workflow_runs[0].conclusion // ""')"
          RUN_ID="$(echo "$JSON" | jq -r '.workflow_runs[0].id')"
          echo "V18C_RUN_ID=$RUN_ID"
          echo "V18C_STATUS=$STATUS"
          echo "V18C_CONCLUSION=$CONCLUSION"
          gh api "repos/$GH_REPO/actions/runs/$RUN_ID/jobs?per_page=100" \
            --jq '.jobs[] | {id, name, status, conclusion, steps: [.steps[] | {number, name, status, conclusion}]}'
          gh api "repos/$GH_REPO/actions/runs/$RUN_ID/artifacts?per_page=100" \
            --jq '{artifacts: [.artifacts[] | {id, name, size_in_bytes, expired, digest}]}'
          if [ "$STATUS" != completed ]; then
            exit 3
          fi
          test "$CONCLUSION" = success
