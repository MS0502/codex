name: TR Winlator compatibility APK

on:
  push:
    branches:
      - tr-wine-compat-patch
    paths:
      - '.github/workflows/tr-winlator-debug-apk.yml'
      - 'tr_winlator_apk/**'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/tr-winlator-debug-apk.yml'
      - 'tr_winlator_apk/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17 for sdkmanager
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK components
        shell: bash
        run: |
          set -e
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(find "$ANDROID_HOME/cmdline-tools" -type f -name sdkmanager -print -quit)"
          fi
          test -x "$SDKMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" \
            'platforms;android-34' \
            'build-tools;34.0.0' \
            'cmake;3.22.1' \
            'ndk;24.0.8215888'

      - name: Set up Java 11 for Android Gradle Plugin
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Fetch official Winlator 11.1 app source
        run: |
          git init winlator-app
          git -C winlator-app remote add origin https://github.com/brunodev85/winlator-app.git
          git -C winlator-app fetch --depth 1 origin c2f4ad4534f4637b543a9a3b085e28f50cf6d01c
          git -C winlator-app checkout --detach FETCH_HEAD
          test "$(git -C winlator-app rev-parse HEAD)" = 'c2f4ad4534f4637b543a9a3b085e28f50cf6d01c'
          git -C winlator-app lfs pull || true

      - name: Apply separate-package debug installer changes
        run: |
          python3 - <<'PY'
          from pathlib import Path

          root = Path('winlator-app')

          def replace(path, old, new):
              p = root / path
              text = p.read_text(encoding='utf-8')
              if text.count(old) != 1:
                  raise SystemExit(f'{path}: expected one match for {old!r}, found {text.count(old)}')
              p.write_text(text.replace(old, new, 1), encoding='utf-8')

          replace('app/build.gradle', "applicationId 'com.winlator'", "applicationId 'com.winlator.trcompat'")
          replace('app/build.gradle', 'versionName "11.1"', 'versionName "11.1-trcompat"')
          replace('app/src/main/AndroidManifest.xml', 'android:authorities="com.winlator.FileProvider"', 'android:authorities="com.winlator.trcompat.FileProvider"')
          replace('app/src/main/java/com/winlator/MainActivity.java', 'public static final boolean DEBUG_MODE = false;', 'public static final boolean DEBUG_MODE = true;')

          strings = root / 'app/src/main/res/values/strings.xml'
          text = strings.read_text(encoding='utf-8')
          text = text.replace('<string name="app_name">Winlator</string>', '<string name="app_name">Winlator TR Compat</string>')
          strings.write_text(text, encoding='utf-8')
          PY
          grep -R "applicationId 'com.winlator.trcompat'" -n winlator-app/app/build.gradle
          grep -R 'DEBUG_MODE = true' -n winlator-app/app/src/main/java/com/winlator/MainActivity.java
          grep -R 'com.winlator.trcompat.FileProvider' -n winlator-app/app/src/main/AndroidManifest.xml

      - name: Build debug APK
        working-directory: winlator-app
        shell: bash
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew --no-daemon --stacktrace assembleDebug 2>&1 | tee ../apk-build.log

      - name: Upload APK build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: WINLATOR_11_1_TR_COMPAT_APK_BUILD_LOG
          path: apk-build.log
          if-no-files-found: warn
          retention-days: 30

      - name: Collect APK
        run: |
          mkdir -p out
          cp winlator-app/app/build/outputs/apk/debug/app-debug.apk out/Winlator_11.1_TR_Compat.apk
          sha256sum out/Winlator_11.1_TR_Compat.apk | tee out/SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: WINLATOR_11_1_TR_COMPAT_APK
          path: out/*
          if-no-files-found: error
          retention-days: 30
