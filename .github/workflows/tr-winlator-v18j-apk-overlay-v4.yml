name: TR Winlator v18j recursive ARM64 closure APK v4

on:
  push:
    branches: [tr-wine-compat-proton11-runtime-closure-v18i]
    paths: [.github/workflows/tr-winlator-v18j-apk-overlay-v4.yml]
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  overlay-and-sign:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            ca-certificates file binutils unzip zip zstd
          python3 -m py_compile tr_winlator_apk/v18j_overlay_rootfs.py

      - name: Download proven v18i APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p base-artifact
          gh run download 29679424111 \
            -R "$GITHUB_REPOSITORY" \
            -n WINLATOR_11_1_TR_COMPAT_APK_V18I_PROTON11_RUNTIME_CLOSURE \
            -D base-artifact
          BASE_APK="$(find base-artifact -type f -name '*.apk' -print -quit)"
          test -n "$BASE_APK"
          cp "$BASE_APK" base-v18i.apk
          sha256sum base-v18i.apk | tee base-v18i-sha256.txt

      - name: Extract v18i rootfs
        run: |
          set -euo pipefail
          mkdir -p rootfs
          unzip -p base-v18i.apk assets/rootfs.tzst > rootfs-v18i.tzst
          test -s rootfs-v18i.tzst
          tar --use-compress-program=unzstd -xf rootfs-v18i.tzst -C rootfs
          test -d rootfs/usr

      - name: Download pinned ARM64 wrapper closure
        run: |
          set -euo pipefail
          mkdir -p native-runtime
          docker run --rm -v "$PWD/native-runtime:/out" ubuntu:22.04 bash -lc '
            set -euo pipefail
            sed -i "s/^deb /deb [arch=amd64] /" /etc/apt/sources.list
            cat >> /etc/apt/sources.list <<"EOF"
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main universe
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main universe
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-security main universe
          EOF
            dpkg --add-architecture arm64
            apt-get update
            mkdir -p /tmp/debs
            cd /tmp/debs
            apt-get download \
              libudev1:arm64 \
              libusb-1.0-0:arm64 \
              libxinerama1:arm64 \
              libdbus-1-3:arm64 \
              libsystemd0:arm64
            for package in ./*.deb; do dpkg-deb -x "$package" /out; done
          '
          find native-runtime -type f -o -type l | sort | tee native-runtime-files.txt

      - name: Merge and recursively audit ARM64 closure
        run: |
          set -euo pipefail
          python3 tr_winlator_apk/v18j_overlay_rootfs.py \
            rootfs native-runtime v18j-native-wrapper-closure-report.txt
          grep -F 'unresolved={}' v18j-native-wrapper-closure-report.txt
          while IFS= read -r path; do file -L "$path"; done \
            < <(find rootfs/usr/lib/aarch64-linux-gnu rootfs/lib/aarch64-linux-gnu \
              \( -name 'libudev.so.1' -o -name 'libudev.so.0' \
                 -o -name 'libusb-1.0.so.0' -o -name 'libXinerama.so.1' \
                 -o -name 'libXinerama.so' -o -name 'libdbus-1.so.3' \
                 -o -name 'libsystemd.so.0' \) 2>/dev/null) \
            | tee v18j-native-file-types.txt
          grep -F 'ARM aarch64' v18j-native-file-types.txt

      - name: Repack v18j rootfs
        run: |
          set -euo pipefail
          tar --sort=name --owner=0 --group=0 --numeric-owner \
            --mtime=@0 --format=gnu -C rootfs -cf rootfs-v18j.tar .
          zstd -19 -f rootfs-v18j.tar -o rootfs-v18j.tzst
          sha256sum rootfs-v18j.tzst | tee rootfs-v18j-sha256.txt
          ls -lh rootfs-v18j.tzst

      - name: Restore matching signing key
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: trcompat-debug-keystore-v1

      - name: Require matching signing key
        run: |
          set -euo pipefail
          test -f "$HOME/.android/debug.keystore"
          keytool -list -keystore "$HOME/.android/debug.keystore" \
            -storepass android -alias androiddebugkey >/dev/null

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android signing tools
        run: |
          set -euo pipefail
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(find "$ANDROID_HOME/cmdline-tools" -type f -name sdkmanager -print -quit)"
          fi
          test -x "$SDKMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" 'build-tools;34.0.0'

      - name: Replace rootfs and sign v18j APK
        run: |
          set -euo pipefail
          mkdir -p apk-update/assets out-v18j
          cp rootfs-v18j.tzst apk-update/assets/rootfs.tzst
          cp base-v18i.apk unsigned-v18j.apk
          zip -q -d unsigned-v18j.apk 'META-INF/*' || true
          (cd apk-update && zip -q -u "$OLDPWD/unsigned-v18j.apk" assets/rootfs.tzst)

          "$ANDROID_HOME/build-tools/34.0.0/zipalign" -f -p 4 \
            unsigned-v18j.apk aligned-v18j.apk
          "$ANDROID_HOME/build-tools/34.0.0/apksigner" sign \
            --ks "$HOME/.android/debug.keystore" \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out out-v18j/Winlator_11.1_TR_Compat_v18J_PROTON11_NATIVE_WRAPPER_CLOSURE.apk \
            aligned-v18j.apk
          "$ANDROID_HOME/build-tools/34.0.0/apksigner" verify \
            --verbose --print-certs \
            out-v18j/Winlator_11.1_TR_Compat_v18J_PROTON11_NATIVE_WRAPPER_CLOSURE.apk \
            | tee v18j-apksigner-verify.txt

          unzip -p out-v18j/*.apk assets/rootfs.tzst > embedded-rootfs-v18j.tzst
          cmp rootfs-v18j.tzst embedded-rootfs-v18j.tzst
          cp v18j-native-wrapper-closure-report.txt out-v18j/
          sha256sum out-v18j/*.apk | tee out-v18j/SHA256SUMS.txt
          ls -lh out-v18j/*

      - name: Upload v18j APK
        uses: actions/upload-artifact@v4
        with:
          name: WINLATOR_11_1_TR_COMPAT_APK_V18J_PROTON11_NATIVE_WRAPPER_CLOSURE
          path: out-v18j/*
          if-no-files-found: error
          retention-days: 30

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: WINLATOR_11_1_TR_COMPAT_V18J_OVERLAY_V4_BUILD_LOG
          path: |
            base-v18i-sha256.txt
            native-runtime-files.txt
            v18j-native-wrapper-closure-report.txt
            v18j-native-file-types.txt
            rootfs-v18j-sha256.txt
            v18j-apksigner-verify.txt
            out-v18j/SHA256SUMS.txt
          if-no-files-found: warn
          retention-days: 30
