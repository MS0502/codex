name: Report v18K ARM64 smoke v2

on:
  push:
    branches: [tr-wine-compat-proton11-xshape-restore-v18k]
    paths: [.github/workflows/tr-v18k-smoke-v2-probe.yml]

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

jobs:
  report:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Wait for v2 and report to PR 19
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          API="repos/${GITHUB_REPOSITORY}/actions/workflows/tr-v18k-arm64-runtime-smoke-v2.yml/runs?branch=tr-wine-compat-proton11-xshape-restore-v18k&per_page=5"
          RUN=''
          for attempt in $(seq 1 80); do
            RUN="$(gh api "$API" --jq '.workflow_runs[0] // empty')"
            if [ -n "$RUN" ] && [ "$(jq -r '.status' <<<"$RUN")" = completed ]; then break; fi
            sleep 15
          done
          if [ -z "$RUN" ]; then
            BODY='ARM64 smoke v2 probe found no workflow run.'
          else
            RUN_ID="$(jq -r '.id' <<<"$RUN")"
            JOBS="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/jobs" --jq '[.jobs[] | {id,name,status,conclusion,steps:[.steps[] | {name,status,conclusion}]}]')"
            ARTIFACTS="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/artifacts" --jq '[.artifacts[] | {id,name,size_in_bytes,expired}]')"
            BODY="$(printf 'v18K accurate ARM64 Wine smoke v2 result\n\nRun:\n```json\n%s\n```\n\nJobs:\n```json\n%s\n```\n\nArtifacts:\n```json\n%s\n```\n' "$RUN" "$JOBS" "$ARTIFACTS")"
          fi
          gh api "repos/${GITHUB_REPOSITORY}/issues/19/comments" -f body="$BODY"
